<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>⚡ Command Center</title>
<meta name="description" content="Nik Sharma's personal operations dashboard">
<meta property="og:title" content="⚡ Command Center">
<meta property="og:url" content="https://dash.nik.co">
<meta property="og:type" content="website">
<meta property="og:image" content="https://dash.nik.co/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="⚡ Command Center">
<meta name="twitter:image" content="https://dash.nik.co/og-image.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Command Center">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --text: #ffffff;
  --text-secondary: #a6a6a6;
  --text-tertiary: rgba(255,255,255,0.6);
  --text-muted: rgba(255,255,255,0.4);
  --accent: #fbbf24;
  --accent-hover: #fcd34d;
  --accent-glow: rgba(251,191,36,0.15);
  --accent-muted: rgba(251,191,36,0.1);
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #fbbf24;
  --border: rgba(255,255,255,0.05);
  --border-std: rgba(255,255,255,0.08);
  --frosted: rgba(255,255,255,0.05);
  --frosted-hover: rgba(255,255,255,0.08);
  font-feature-settings: "cv01", "cv05", "cv09", "cv11", "ss03", "ss07";
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --text: #000000;
  --text-secondary: #555555;
  --text-tertiary: rgba(0,0,0,0.55);
  --text-muted: rgba(0,0,0,0.35);
  --accent: #d97706;
  --accent-hover: #b45309;
  --accent-glow: rgba(217,119,6,0.12);
  --accent-muted: rgba(217,119,6,0.08);
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #d97706;
  --border: rgba(0,0,0,0.06);
  --border-std: rgba(0,0,0,0.1);
  --frosted: rgba(0,0,0,0.03);
  --frosted-hover: rgba(0,0,0,0.06);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-family: 'Inter Variable', Inter, -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body { background: var(--bg); min-height: 100vh; min-height: 100dvh; }

/* ─── Passcode Gate ─── */
#gate {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 24px;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#gate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

#gate h1 {
  font-size: 24px; font-weight: 600; letter-spacing: -1px;
  color: var(--text);
}
#gate .subtitle {
  font-size: 13px; color: var(--text-muted); margin-top: -16px;
}

.pin-wrap { display: flex; gap: 12px; }
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid var(--border-std);
  background: transparent;
  transition: all 0.15s ease;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: var(--red); border-color: var(--red); }

.numpad {
  display: grid; grid-template-columns: repeat(3, 72px); gap: 12px;
  margin-top: 8px;
}
.numpad button {
  width: 72px; height: 72px; border-radius: 50%;
  border: 1px solid var(--border-std);
  background: var(--frosted);
  color: var(--text);
  font-family: inherit; font-size: 24px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.numpad button:hover { background: var(--frosted-hover); }
.numpad button:active { transform: scale(0.92); }
.numpad button.fn { font-size: 13px; font-weight: 400; color: var(--text-muted); border-color: transparent; background: transparent; }
.numpad button.fn:hover { color: var(--text-secondary); }

/* ─── Dashboard ─── */
#app {
  opacity: 0; visibility: hidden;
  transition: opacity 0.5s ease 0.1s, visibility 0.5s ease 0.1s;
  padding: 24px 20px 80px;
  max-width: 1200px; margin: 0 auto;
}
#app.visible { opacity: 1; visibility: visible; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 0 32px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header h1 {
  font-size: 20px; font-weight: 600; letter-spacing: -0.5px;
}
.header h1 span { color: var(--accent); }
.theme-toggle {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 8px;
  border-radius: 8px; transition: color 0.2s;
  line-height: 1;
}
.theme-toggle:hover { color: var(--text); }

/* Attention Bar */
.attention-bar {
  background: var(--frosted);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 24px;
  font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  letter-spacing: -0.2px;
}
.attention-bar.clear { color: var(--green); }
.attention-bar.alert { color: var(--accent); border-color: rgba(251,191,36,0.15); }
.attention-count {
  font-variant-numeric: tabular-nums;
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 13px;
}

/* Card Grid */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }

/* Card */
.card {
  background: var(--frosted);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}
.card:hover { background: var(--frosted-hover); border-color: var(--border-std); }
.card.needs-attention { border-color: rgba(251,191,36,0.2); }
.card.needs-attention::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 14px;
}
.card-title-row { display: flex; align-items: center; gap: 8px; }
.card-emoji { font-size: 16px; line-height: 1; }
.card-name {
  font-size: 14px; font-weight: 600; letter-spacing: -0.3px;
  color: var(--text);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; margin-top: 2px;
}
.status-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.status-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(251,191,36,0.4); }
.status-dot.red { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }

.card-meta {
  font-size: 11px; font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.card-attention {
  font-size: 12px; font-weight: 500;
  color: var(--accent);
  background: var(--accent-muted);
  padding: 6px 10px;
  border-radius: 6px;
  margin-bottom: 12px;
  line-height: 1.4;
}

.card-updates { display: flex; flex-direction: column; gap: 8px; }
.update-item {
  font-size: 13px; line-height: 1.5;
  color: var(--text-secondary);
  padding-left: 12px;
  position: relative;
}
.update-item::before {
  content: '';
  position: absolute; left: 0; top: 7px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--border-std);
}

.card-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease;
}
.card.expanded .card-detail { max-height: 300px; }

.detail-updates {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}

.card-metrics {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex; gap: 20px; flex-wrap: wrap;
}
.metric {
  display: flex; flex-direction: column; gap: 2px;
}
.metric-value {
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 16px; font-weight: 600;
  color: var(--text);
  letter-spacing: -0.5px;
}
.metric-label {
  font-size: 10px; font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.expand-hint {
  display: flex; align-items: center; justify-content: center;
  margin-top: 12px;
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.3px;
  transition: color 0.2s;
}
.card:hover .expand-hint { color: var(--text-secondary); }
.expand-arrow {
  display: inline-block;
  transition: transform 0.3s ease;
  margin-left: 4px;
}
.card.expanded .expand-arrow { transform: rotate(180deg); }

/* Footer */
.footer {
  text-align: center;
  margin-top: 48px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

/* Transitions */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeIn 0.4s ease backwards; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.20s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(6) { animation-delay: 0.30s; }
.card:nth-child(7) { animation-delay: 0.35s; }
.card:nth-child(8) { animation-delay: 0.40s; }
.card:nth-child(9) { animation-delay: 0.45s; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-std); border-radius: 3px; }
</style>
</head>
<body>

<!-- Passcode Gate -->
<div id="gate">
  <h1>⚡ Command Center</h1>
  <p class="subtitle">Enter passcode</p>
  <div class="pin-wrap">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button onclick="pinKey('1')">1</button>
    <button onclick="pinKey('2')">2</button>
    <button onclick="pinKey('3')">3</button>
    <button onclick="pinKey('4')">4</button>
    <button onclick="pinKey('5')">5</button>
    <button onclick="pinKey('6')">6</button>
    <button onclick="pinKey('7')">7</button>
    <button onclick="pinKey('8')">8</button>
    <button onclick="pinKey('9')">9</button>
    <button class="fn" onclick="pinClear()">Clear</button>
    <button onclick="pinKey('0')">0</button>
    <button class="fn" onclick="pinBack()">⌫</button>
  </div>
</div>

<!-- Dashboard -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <h1><span>⚡</span> Command Center</h1>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" id="themeBtn">🌙</button>
  </div>
  <div class="attention-bar" id="attentionBar"></div>
  <div class="grid" id="grid"></div>
  <div class="footer">dash.nik.co · last refreshed <span id="refreshTime"></span></div>
</div>

<script>
// ─── Passcode ───
const HASH = '490d3f320e422627a4988064d699dd4e4e26436aecbbb15952d964ffc12918b8';
let pin = '';

function pinKey(n) {
  if (pin.length >= 4) return;
  pin += n;
  updateDots();
  if (pin.length === 4) setTimeout(checkPin, 200);
}
function pinBack() { pin = pin.slice(0, -1); updateDots(); }
function pinClear() { pin = ''; updateDots(); }

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
  }
}

async function checkPin() {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(pin));
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  if (hex === HASH) {
    sessionStorage.setItem('cc_auth', '1');
    unlock();
  } else {
    document.querySelectorAll('.pin-dot').forEach(d => d.className = 'pin-dot error');
    setTimeout(() => { pin = ''; updateDots(); }, 600);
  }
}

function unlock() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadDashboard();
}

// Auto-unlock if already authed this session
if (sessionStorage.getItem('cc_auth') === '1') {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadDashboard();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (!document.getElementById('gate').classList.contains('hidden')) {
    if (e.key >= '0' && e.key <= '9') pinKey(e.key);
    else if (e.key === 'Backspace') pinBack();
    else if (e.key === 'Escape') pinClear();
  }
});

// ─── Theme ───
function getInitialTheme() {
  const saved = localStorage.getItem('cc_theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('cc_theme', t);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
applyTheme(getInitialTheme());

// ─── Dashboard ───
async function loadDashboard() {
  try {
    const res = await fetch('dashboard-data.json?_=' + Date.now());
    const data = await res.json();
    renderAttentionBar(data.cards);
    renderGrid(data.cards);
    renderRefreshTime(data.lastRefreshed);
  } catch (e) {
    document.getElementById('grid').innerHTML = '<p style="color:var(--red);padding:20px;">Failed to load dashboard data.</p>';
  }
}

function renderAttentionBar(cards) {
  const bar = document.getElementById('attentionBar');
  const items = cards.filter(c => c.needsAttention);
  if (items.length === 0) {
    bar.className = 'attention-bar clear';
    bar.innerHTML = '✓ All clear — nothing needs your attention';
  } else {
    bar.className = 'attention-bar alert';
    bar.innerHTML = `<span class="attention-count">${items.length}</span> item${items.length > 1 ? 's' : ''} need${items.length === 1 ? 's' : ''} your attention`;
  }
}

function statusDotClass(card) {
  if (card.needsAttention) return 'yellow';
  if (card.status === 'operational' || card.status === 'active') return 'green';
  if (card.status === 'blocked') return 'red';
  return 'green';
}

function formatDate(d) {
  const date = new Date(d + 'T00:00:00');
  const now = new Date();
  const diff = Math.floor((now - date) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return diff + 'd ago';
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function metricsDisplay(metrics) {
  if (!metrics || Object.keys(metrics).length === 0) return '';
  const metricMap = {
    tracksInProgress: 'Tracks',
    nextSession: 'Next Session',
    upcomingReleases: 'Upcoming',
    nextRelease: 'Next Release',
    stations: 'Stations',
    banksDeployed: 'Banks',
    mtdRevenue: 'MTD Rev',
    hp719Status: 'HP-719',
    cb628Status: 'CB-628',
    activeAgents: 'Agents',
    uptime: 'Uptime',
    activeDealFlow: 'Pipeline',
    portfolioCos: 'Portfolio',
    subscribers: 'Subscribers',
    lastEpDownloads: 'Last Ep',
    lastOpenRate: 'Open Rate',
    activeClients: 'Clients',
    clients: null
  };
  let html = '';
  for (const [key, val] of Object.entries(metrics)) {
    if (key === 'clients') continue;
    const label = metricMap[key] || key;
    const display = typeof val === 'string' && val.match(/^\d{4}-/) ? formatDate(val) : val;
    html += `<div class="metric"><span class="metric-value">${display}</span><span class="metric-label">${label}</span></div>`;
  }
  return html ? `<div class="card-metrics">${html}</div>` : '';
}

function renderGrid(cards) {
  const grid = document.getElementById('grid');
  grid.innerHTML = cards.map((c, i) => {
    const visibleUpdates = c.updates.slice(0, 2);
    const hiddenUpdates = c.updates.slice(2);
    return `
    <div class="card${c.needsAttention ? ' needs-attention' : ''}" onclick="this.classList.toggle('expanded')">
      <div class="card-header">
        <div class="card-title-row">
          <span class="card-emoji">${c.emoji}</span>
          <span class="card-name">${c.name}</span>
        </div>
        <div class="status-dot ${statusDotClass(c)}"></div>
      </div>
      <div class="card-meta">Updated ${formatDate(c.lastUpdated)}</div>
      ${c.needsAttention && c.attentionReason ? `<div class="card-attention">⚠ ${c.attentionReason}</div>` : ''}
      <div class="card-updates">
        ${visibleUpdates.map(u => `<div class="update-item">${u.text}</div>`).join('')}
      </div>
      <div class="card-detail">
        ${hiddenUpdates.length ? `<div class="detail-updates">${hiddenUpdates.map(u => `<div class="update-item">${u.text}</div>`).join('')}</div>` : ''}
        ${metricsDisplay(c.metrics)}
      </div>
      ${(hiddenUpdates.length || Object.keys(c.metrics || {}).length) ? `<div class="expand-hint">Details <span class="expand-arrow">↓</span></div>` : ''}
    </div>`;
  }).join('');
}

function renderRefreshTime(ts) {
  const el = document.getElementById('refreshTime');
  if (!ts) { el.textContent = '—'; return; }
  const d = new Date(ts);
  el.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}
</script>
</body>
</html>
