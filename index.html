<style>
:root {
  /* DESIGN.md v2.0 canonical tokens — Violet palette */
  --paper: #F4F1EC;
  --ink: #111111;
  --bg-deep: #EDE8E0;
  --line: rgba(17,17,17,0.10);
  --line-strong: rgba(17,17,17,0.25);
  --mute: rgba(17,17,17,0.55);
  --mute-2: rgba(17,17,17,0.38);
  --accent: #5E5BE7;
  --accent-strong: #4C49CC;
  --accent-muted: rgba(94,91,231,0.08);
  --accent-ring: rgba(94,91,231,0.24);

  /* Status colors retuned for paper background */
  --green: #15803D;
  --green-bg: rgba(21,128,61,0.10);
  --yellow: #B45309;
  --yellow-bg: rgba(180,83,9,0.10);
  --red: #DC2626;
  --red-bg: rgba(220,38,38,0.10);
  --blue: #2563EB;
  --blue-bg: rgba(37,99,235,0.10);

  /* Legacy aliases so downstream CSS keeps working */
  --bg: var(--paper);
  --surface: #ffffff;
  --text: var(--ink);
  --text-secondary: var(--mute);
  --text-tertiary: var(--mute);
  --text-muted: var(--mute-2);
  --accent-hover: var(--accent-strong);
  --accent-glow: var(--accent-muted);
  --border: var(--line);
  --border-std: var(--line-strong);
  --frosted: rgba(17,17,17,0.04);
  --subtle: rgba(17,17,17,0.04);

  --display: 'Inter Display', 'Inter Variable', 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  --sans: 'Inter Variable', 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
  --display-track: -0.04em;
  --body-track: -0.005em;
  --mono-track: 0.18em;

  font-family: var(--sans);
  font-feature-settings: "cv01", "cv05", "cv09", "cv11", "ss03", "ss07";
}

/* Dark (ink) mode variant — toggled via [data-theme="ink"] on <html> */
html[data-theme="ink"] {
  --paper: #111111;
  --ink: #F4F1EC;
  --bg-deep: #1a1a1a;
  --line: rgba(244,241,236,0.10);
  --line-strong: rgba(244,241,236,0.25);
  --mute: rgba(244,241,236,0.55);
  --mute-2: rgba(244,241,236,0.38);
  --accent-muted: rgba(94,91,231,0.15);
  --surface: #1a1a1a;
}
html[data-theme="ink"] { color-scheme: dark; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--paper); color:var(--ink); min-height:100vh;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  font-family:var(--sans); letter-spacing:var(--body-track);
  overflow-x:hidden;
}
::selection { background: var(--accent); color: #fff; }

/* nS mark SVG */
.ns-mark-svg { display:inline-block; width:18px; height:24px; color:var(--ink); flex-shrink:0; vertical-align:middle; }
.ns-mark-svg.accent { color: var(--accent); }
.ns-mark-svg.lg { width:28px; height:38px; }
.ns-mark-svg.xl { width:40px; height:54px; }
.ns-mark-defs { position:absolute; width:0; height:0; overflow:hidden; }

/* Passcode — stays on ink background per brief */
#passcode-overlay {
  position:fixed; inset:0; background:#111111; z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;
  padding:24px;
}
#passcode-overlay.hidden { display:none; }
#passcode-overlay .gate-mark { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
#passcode-overlay .gate-mark .ns-mark-svg { color: var(--accent); width:28px; height:38px; }
#passcode-overlay .gate-mark span { font-family: var(--mono); font-size:10.5px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:rgba(244,241,236,0.55); }
#passcode-overlay h2 {
  font-family: var(--display); font-size:36px; font-weight:800; letter-spacing:var(--display-track);
  color:#F4F1EC; line-height:1.05;
}
#passcode-overlay p { font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:var(--mono-track); text-transform:uppercase; color:rgba(244,241,236,0.55); }
#passcode-input {
  background:#F4F1EC; border:1px solid rgba(244,241,236,0.25); border-radius:8px;
  padding:14px 20px; font-size:22px; letter-spacing:12px; text-align:center;
  color:#111111; width:220px; outline:none; font-family:var(--mono); font-weight:500;
}
#passcode-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
#passcode-submit {
  background:var(--accent); color:#ffffff; border:0; border-radius:999px;
  height:44px; padding:0 28px; font-size:14px; font-weight:500; cursor:pointer;
  letter-spacing:0.05em; font-family:var(--sans);
  transition:background .15s ease, transform .05s ease;
  min-width:140px;
}
#passcode-submit:hover { background:var(--accent-strong); }
#passcode-submit:active { transform:scale(0.98); }
#passcode-submit:disabled { opacity:0.4; cursor:not-allowed; }
#passcode-error { color:#F87171; font-size:12px; font-family:var(--mono); letter-spacing:0.08em; text-transform:uppercase; display:none; }

/* App */
.app { display:none; max-width:1200px; margin:0 auto; padding:28px 20px 80px; }
.app.visible { display:block; }
@media (min-width: 768px) { .app { padding:40px 32px 96px; } }

/* Header */
.header {
  margin-bottom:28px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:12px 16px;
  padding-bottom:20px; border-bottom:1px solid var(--line);
}
.header .header-title { display:flex; align-items:center; gap:14px; min-width:0; flex-wrap:wrap; }
.header .header-title .ns-mark-svg { color: var(--accent); width:32px; height:44px; }
.header h1 {
  font-family: var(--display);
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 800; letter-spacing: var(--display-track);
  line-height: 1; color: var(--ink);
}
.header .subtitle {
  font-family: var(--mono); font-size:10.5px; font-weight:500;
  letter-spacing: var(--mono-track); text-transform:uppercase;
  color:var(--mute);
}

/* Summary bar */
.summary-bar {
  display:flex; gap:14px; margin-bottom:28px; padding:18px 20px;
  background:var(--bg-deep); border:1px solid var(--line); border-radius:0;
  flex-wrap:wrap; align-items:center;
}
.summary-stat { min-width:80px; }
.summary-value {
  font-family: var(--display); font-size:28px; font-weight:800;
  letter-spacing:var(--display-track); color:var(--ink);
  font-variant-numeric: tabular-nums; line-height:1;
}
.summary-label {
  font-family: var(--mono); font-size:10px; font-weight:500;
  text-transform:uppercase; letter-spacing:var(--mono-track);
  color:var(--mute); margin-top:8px;
}
.summary-divider { width:1px; background:var(--line); margin:0 4px; align-self:stretch; }
@media (max-width: 640px) {
  .summary-divider { display:none; }
  .summary-bar { gap:18px 24px; }
}

/* Flagged Section */
.flagged-section { margin-bottom:32px; }
.flagged-header {
  display:flex; align-items:center; gap:12px; margin-bottom:16px;
  padding-bottom:12px; border-bottom:1px solid var(--line);
}
.flagged-header h2 {
  font-family: var(--display);
  font-size:20px; font-weight:700; letter-spacing:-0.025em; color:var(--ink);
}
.flagged-count {
  background: var(--accent-muted); color:var(--accent);
  font-family: var(--mono); font-size:10px; font-weight:500;
  padding:3px 10px; border-radius:999px;
  text-transform:uppercase; letter-spacing:var(--mono-track);
}
.flagged-grid {
  display:grid; grid-template-columns:1fr; gap:10px;
}
.flagged-item {
  background: #ffffff; border:1px solid var(--line); border-radius:0;
  padding:16px 18px; display:flex; align-items:flex-start; gap:14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.flagged-item.blocked { border-color: rgba(220,38,38,0.35); box-shadow: rgba(220,38,38,0.08) 0px 0px 0px 1px; }
.flagged-item.attention { border-color: var(--accent-ring); box-shadow: var(--accent-muted) 0px 0px 0px 1px; }
.flagged-item .flag-emoji { font-size:16px; flex-shrink:0; padding-top:2px; opacity:0.9; }
.flagged-item .flag-content { flex:1; min-width:0; }
.flagged-item .flag-title { font-family: var(--display); font-size:15px; font-weight:700; letter-spacing:-0.02em; margin-bottom:4px; color:var(--ink); }
.flagged-item .flag-detail { font-size:14px; color:var(--mute); line-height:1.5; letter-spacing:var(--body-track); }
.flagged-item .flag-since {
  font-family: var(--mono); font-size:10px; color:var(--mute-2);
  margin-top:8px; text-transform:uppercase; letter-spacing:var(--mono-track); font-weight:500;
}

/* Commitments section (disabled upstream but keep styles compliant) */
.commitments-section { margin-top: 40px; }
.commitments-section-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.commitments-section-header h2 { font-family: var(--display); font-size: 20px; font-weight: 700; letter-spacing: -0.025em; color: var(--ink); }
.commitments-section-header .cmt-stats { font-family: var(--mono); font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: var(--mono-track); font-weight: 500; display:flex; gap: 14px; }
.commitments-section-header .cmt-stats strong { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
.commitments-section-header .cmt-stats .cmt-stat-overdue strong { color: var(--red); }
.commitments-section-header .cmt-stats .cmt-stat-aging strong { color: var(--accent); }
.commitments-list { display:flex; flex-direction: column; gap: 8px; }
.commitment-card { display:flex; gap:12px; padding: 12px 14px; background: #ffffff; border: 1px solid var(--line); border-radius: 0; transition: border-color .12s ease; }
.commitment-card.overdue { border-color: rgba(220,38,38,0.30); box-shadow: rgba(220,38,38,0.08) 0px 0px 0px 1px; }
.commitment-card.aging { border-color: var(--accent-ring); }
.cmt-badge { font-family: var(--mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: var(--mono-track); padding: 3px 8px; border-radius: 999px; flex-shrink: 0; height: fit-content; white-space: nowrap; }
.cmt-badge.open { background: var(--bg-deep); color: var(--mute); }
.cmt-badge.aging { background: var(--accent-muted); color: var(--accent); }
.cmt-badge.overdue { background: var(--red-bg); color: var(--red); }
.cmt-body { flex: 1; min-width: 0; }
.cmt-sentence { font-size: 14px; color: var(--ink); line-height: 1.5; margin-bottom: 4px; letter-spacing: var(--body-track); }
.cmt-meta { font-family: var(--mono); font-size: 10px; color: var(--mute-2); text-transform: uppercase; letter-spacing: var(--mono-track); font-weight: 500; display:flex; flex-wrap:wrap; gap: 8px; }
.cmt-meta .dot { opacity: 0.6; }
.cmt-meta a { color: var(--accent); text-decoration: none; }
.cmt-empty { padding: 20px; text-align: center; color: var(--mute); font-size: 13px; background: var(--bg-deep); border: 1px dashed var(--line-strong); border-radius: 0; }

/* Sites section */
.sites-section { margin-top: 48px; }
.sites-section-header { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.sites-section-header h2 { font-family: var(--display); font-size: 20px; font-weight: 700; letter-spacing: -0.025em; color: var(--ink); display:flex; align-items:center; gap:10px; }
.sites-section-header h2 .ns-mark-svg { color: var(--accent); }
.sites-section-header .sites-meta { font-family: var(--mono); font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: var(--mono-track); font-weight: 500; }
.sites-group { margin-bottom: 28px; }
.sites-group-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: var(--mono-track); color: var(--mute); font-weight: 500; margin-bottom: 12px; display:flex; align-items:center; gap:10px; }
.sites-group-count { background: var(--bg-deep); color: var(--ink); padding: 2px 8px; border-radius: 999px; font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; }
.sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.site-card { background: #ffffff; border: 1px solid var(--line); border-radius: 0; padding: 14px 16px; transition: border-color .12s ease, box-shadow .12s ease; }
.site-card:hover { border-color: var(--accent); box-shadow: var(--accent-ring) 0px 0px 0px 1px; }
.site-card.building { border-color: var(--accent-ring); box-shadow: var(--accent-muted) 0px 0px 0px 1px; }
.site-card.staging { border-color: rgba(37,99,235,0.25); }
.site-card.draft { opacity: 0.7; }
.site-sub { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom: 6px; }
.site-link { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.02em; color: var(--accent); text-decoration: none; word-break: break-all; }
.site-link:hover { color: var(--accent-strong); text-decoration: underline; text-underline-offset: 3px; }
.site-status { font-family: var(--mono); font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: var(--mono-track); padding: 3px 8px; border-radius: 999px; flex-shrink: 0; }
.site-status.live { background: var(--green-bg); color: var(--green); }
.site-status.building { background: var(--accent-muted); color: var(--accent); }
.site-status.staging { background: var(--blue-bg); color: var(--blue); }
.site-status.draft { background: var(--bg-deep); color: var(--mute); }
.site-purpose { font-size: 13px; color: var(--mute); line-height: 1.5; margin-bottom: 8px; letter-spacing: var(--body-track); }
.site-meta { display:flex; flex-wrap:wrap; gap: 8px; font-family: var(--mono); font-size: 10px; color: var(--mute-2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.site-meta span { display:inline-block; }
.site-meta .dot { color: var(--mute-2); }

/* Newsletter countdown */
.newsletter-bar {
  margin-bottom:28px; padding:16px 20px;
  background:#ffffff; border:1px solid var(--line); border-radius:0;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.newsletter-bar .nl-icon { font-size:16px; opacity:0.8; }
.newsletter-bar .nl-label { font-family: var(--mono); font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:var(--mono-track); color:var(--mute); margin-bottom:4px; }
.newsletter-bar .nl-status { font-size:15px; font-weight:500; color:var(--ink); letter-spacing:var(--body-track); }
.newsletter-bar .nl-status .done { color:var(--green); }
.newsletter-bar .nl-status .pending { color:var(--accent); }
.newsletter-bar .nl-countdown {
  margin-left:auto; font-family: var(--mono); font-size:11px;
  color:var(--mute); letter-spacing:0.08em; text-transform:uppercase; font-weight:500;
}
.newsletter-bar .nl-countdown strong { color:var(--accent); font-weight:600; }
@media (max-width: 640px) { .newsletter-bar .nl-countdown { margin-left:0; width:100%; } }

/* Section headers */
.section { margin-bottom:36px; }
.section-header {
  display:flex; align-items:center; gap:10px;
  font-family: var(--display);
  font-size:20px; font-weight:700; letter-spacing:-0.025em;
  color:var(--ink); margin-bottom:16px;
  padding-bottom:12px; border-bottom:1px solid var(--line);
  text-transform:none;
}
.section-header .ns-mark-svg { color: var(--accent); width:18px; height:24px; }

/* Grid */
.card-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;
}
@media (max-width:1024px) { .card-grid { grid-template-columns:repeat(2, 1fr); } }
@media (max-width:640px) { .card-grid { grid-template-columns:1fr; gap:10px; } }

/* Cards */
.card {
  background:#ffffff; border:1px solid var(--line); border-radius:0;
  padding:18px 18px 16px; transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: var(--accent); box-shadow: var(--accent-ring) 0px 0px 0px 1px; }
.card.attention { border-color: var(--accent-ring); box-shadow: var(--accent-muted) 0px 0px 0px 1px; }
.card.blocked { border-color: rgba(220,38,38,0.30); box-shadow: rgba(220,38,38,0.08) 0px 0px 0px 1px; }

.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
.card-title { display:flex; align-items:center; gap:8px; min-width:0; }
.card-title .emoji { font-size:16px; flex-shrink:0; opacity:0.9; }
.card-title h3 { font-family: var(--display); font-size:15px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-dot.on-track { background:var(--green); }
.status-dot.attention { background:var(--accent); }
.status-dot.blocked { background:var(--red); }

.card-meta { font-family: var(--mono); font-size:10px; color:var(--mute-2); text-transform:uppercase; letter-spacing:var(--mono-track); font-weight:500; margin-bottom:12px; }

.card-bullets { list-style:none; padding:0; }
.card-bullets li {
  font-size:13px; line-height:1.55; color:var(--mute);
  padding:3px 0 3px 14px; position:relative;
  letter-spacing: var(--body-track);
}
.card-bullets li::before {
  content:''; position:absolute; left:0; top:10px;
  width:4px; height:4px; border-radius:50%; background:var(--mute-2);
}

.card-attention {
  margin-top:12px; padding:10px 12px; border-radius:0;
  background: var(--accent-muted); font-size:12px; font-weight:500;
  color:var(--accent); line-height:1.5; letter-spacing: var(--body-track);
  border-left:2px solid var(--accent);
}

/* Newsletter (Sharma list) — inherits Violet dashboard palette per DESIGN.md §3 */
.nl-section { margin-top: 48px; }
.nl-section-header { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.nl-section-header h2 { font-family: var(--display); font-size: 20px; font-weight: 700; letter-spacing: -0.025em; color: var(--ink); display:flex; align-items:center; gap:10px; }
.nl-section-header h2 .ns-mark-svg { color: var(--accent); }
.nl-section-header .nl-section-meta { font-family: var(--mono); font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: var(--mono-track); font-weight: 500; }
.nl-section-header .nl-section-meta .nl-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--accent); vertical-align: middle; margin-right: 6px; box-shadow: 0 0 0 3px var(--accent-muted); }

/* Hero stat cards */
.nl-hero-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
@media (max-width: 900px) { .nl-hero-grid { grid-template-columns: repeat(2, 1fr); } }
.nl-hero { background: #ffffff; border: 1px solid var(--line); border-radius: 0; padding: 18px 20px; position: relative; overflow: hidden; }
.nl-hero::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background: var(--accent); }
.nl-hero-label { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: var(--mono-track); text-transform: uppercase; color: var(--mute); margin-bottom: 12px; }
.nl-hero-value { font-family: var(--display); font-size: 32px; font-weight: 800; letter-spacing: var(--display-track); color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1; }
.nl-hero-sub { font-family: var(--mono); font-size: 10px; color: var(--mute); margin-top: 10px; font-variant-numeric: tabular-nums; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.nl-hero-delta { font-family: var(--mono); font-size: 10px; font-weight: 500; font-variant-numeric: tabular-nums; padding: 2px 7px; border-radius: 999px; display: inline-block; margin-left: 6px; letter-spacing: 0.04em; }
.nl-hero-delta.up { background: var(--green-bg); color: var(--green); }
.nl-hero-delta.down { background: var(--red-bg); color: var(--red); }
.nl-hero-delta.flat { background: var(--bg-deep); color: var(--mute); }

/* Block wrapper */
.nl-block { background: #ffffff; border: 1px solid var(--line); border-radius: 0; padding: 20px 22px; margin-bottom: 12px; }
.nl-block-title { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: var(--mono-track); text-transform: uppercase; color: var(--mute); margin-bottom: 16px; display:flex; align-items:baseline; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.nl-block-note { font-family: var(--mono); font-size: 10px; color: var(--mute-2); font-variant-numeric: tabular-nums; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

/* Growth chart (SVG) */
.nl-chart { width:100%; height: 200px; display:block; }
.nl-chart .axis { stroke: var(--line-strong); stroke-width: 1; }
.nl-chart .bar { fill: var(--accent); opacity: 0.55; transition: opacity .15s; }
.nl-chart .bar.current { opacity: 1; }
.nl-chart .label { fill: var(--mute-2); font-size: 9px; font-family: var(--mono); letter-spacing: 0.12em; text-transform: uppercase; }
.nl-chart .value { fill: var(--mute); font-size: 10px; font-variant-numeric: tabular-nums; font-weight: 500; }

/* Stacked engagement bar */
.nl-stack-wrap { display:flex; flex-direction: column; gap: 14px; }
.nl-stack-bar { height: 14px; background: var(--bg-deep); border-radius: 2px; overflow: hidden; display:flex; }
.nl-stack-seg { height:100%; transition: opacity .15s; }
.nl-stack-seg.active { background: var(--accent); }
.nl-stack-seg.passive { background: rgba(94, 91, 231, 0.55); }
.nl-stack-seg.disengaged { background: rgba(94, 91, 231, 0.28); }
.nl-stack-seg.dormant { background: rgba(17,17,17,0.12); }
.nl-stack-legend { display:flex; flex-wrap:wrap; gap: 14px 20px; font-size: 12px; color: var(--mute); font-family: var(--sans); }
.nl-stack-legend .sw { display:inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
.nl-stack-legend .count { font-family: var(--mono); font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 500; margin-left: 6px; }
.nl-stack-legend .pct { font-family: var(--mono); color: var(--mute-2); font-variant-numeric: tabular-nums; margin-left: 4px; font-size: 11px; }

/* Source + latest tables */
.nl-table { width:100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.nl-table th { text-align: left; font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: var(--mono-track); text-transform: uppercase; color: var(--mute); padding: 0 12px 10px 0; border-bottom: 1px solid var(--line-strong); }
.nl-table th.num { text-align: right; }
.nl-table td { padding: 12px 12px 12px 0; font-size: 14px; color: var(--mute); border-bottom: 1px solid var(--line); letter-spacing: var(--body-track); }
.nl-table td.num { text-align: right; color: var(--ink); font-weight: 500; font-family: var(--mono); font-size: 13px; }
.nl-table tr:last-child td { border-bottom: none; }
.nl-table .src-name { color: var(--ink); font-weight: 500; }
.nl-table .mono { font-family: var(--mono); font-size: 12px; color: var(--mute); letter-spacing: 0.02em; }
.nl-table .ago { font-family: var(--mono); font-size: 10px; color: var(--mute-2); text-transform: uppercase; letter-spacing: 0.08em; font-weight:500; }
.nl-source-bar { display:inline-block; height: 6px; background: var(--accent); border-radius: 2px; margin-right: 8px; vertical-align: middle; min-width: 2px; opacity:0.8; }
.nl-latest-vip { color: var(--accent); font-weight: 600; }

.nl-empty { padding: 16px; text-align: center; color: var(--mute); font-size: 12px; border: 1px dashed var(--line-strong); border-radius: 0; }
.nl-error { padding: 16px; text-align: center; color: var(--red); font-size: 12px; border: 1px dashed rgba(220,38,38,0.3); border-radius: 0; background: rgba(220,38,38,0.04); }

/* Theme toggle */
.theme-toggle {
  position:fixed; top:16px; right:16px; z-index:100;
  background: rgba(244,241,236,0.85); border:1px solid var(--line-strong);
  border-radius:999px; padding:0 16px; height:36px; cursor:pointer;
  font-family: var(--mono); font-size:10px; font-weight:500;
  letter-spacing: var(--mono-track); text-transform:uppercase;
  line-height:1; color:var(--ink);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  transition:all 0.15s ease;
  display:inline-flex; align-items:center; gap:6px;
}
.theme-toggle:hover { background: var(--accent-muted); border-color: var(--accent); color: var(--accent); }
html[data-theme="ink"] .theme-toggle { background: rgba(26,26,26,0.85); }

/* Responsive tightening */
@media (max-width: 640px) {
  .header h1 { font-size: 32px; }
  .header .header-title .ns-mark-svg { width:26px; height:36px; }
  .summary-value { font-size: 22px; }
  .nl-hero-value { font-size: 26px; }
  .nl-block { padding: 16px 16px; }
  .site-link { font-size: 12px; }
}

/* Tap targets */
@media (pointer: coarse) {
  .site-card, .card, .flagged-item { min-height: 44px; }
  .theme-toggle { height: 44px; }

}

<script>
const PASSCODE_HASH = '490d3f320e422627a4988064d699dd4e4e26436aecbbb15952d964ffc12918b8';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Passcode
const overlay = document.getElementById('passcode-overlay');
const input = document.getElementById('passcode-input');
const error = document.getElementById('passcode-error');

if (sessionStorage.getItem('dash-auth') === 'true') {
  overlay.classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadData();
}

const submitBtn = document.getElementById('passcode-submit');

async function tryUnlock() {
  if (!input.value || input.value.length < 4) {
    error.textContent = 'Enter a 4-digit passcode';
    error.style.display = 'block';
    input.focus();
    return;
  }
  const hash = await sha256(input.value);
  if (hash === PASSCODE_HASH) {
    sessionStorage.setItem('dash-auth', 'true');
    overlay.classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadData();
  } else {
    error.textContent = 'Invalid passcode';
    error.style.display = 'block';
    input.value = '';
    input.focus();
  }
}

input.addEventListener('input', () => {
  error.style.display = 'none';
  if (input.value.length === 4) tryUnlock();
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    tryUnlock();
  }
});

submitBtn.addEventListener('click', (e) => {
  e.preventDefault();
  tryUnlock();
});

// Theme toggle — paper <-> ink
(function setupThemeToggle() {
  const btn = document.getElementById('themeToggle');
  const label = document.getElementById('themeToggleLabel');
  if (!btn || !label) return;
  const saved = localStorage.getItem('dash-theme');
  if (saved === 'ink') {
    document.documentElement.setAttribute('data-theme', 'ink');
    label.textContent = 'Paper';
  }
  btn.addEventListener('click', () => {
    const isInk = document.documentElement.getAttribute('data-theme') === 'ink';
    if (isInk) {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = 'Dark';
      localStorage.setItem('dash-theme', 'paper');
    } else {
      document.documentElement.setAttribute('data-theme', 'ink');
      label.textContent = 'Paper';
      localStorage.setItem('dash-theme', 'ink');
    }
  });
})();

async function loadData() {
  try {
    const res = await fetch('dashboard-data.json?t=' + Date.now());
    const data = await res.json();
    render(data);
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

function daysUntilSunday() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  if (day === 0) return 0;
  return 7 - day;
}

function formatSince(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function render(data) {
  // Subtitle
  const refreshed = new Date(data.lastRefreshed).toLocaleDateString('en-US', {
    month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  document.getElementById('subtitle').textContent = `Last refreshed: ${refreshed}`;

  // ── Flagged Section ──
  if (data.flagged && data.flagged.length > 0) {
    let flagHtml = `
      <div class="flagged-section">
        <div class="flagged-header">
          <h2><svg class="ns-mark-svg" viewBox="0 0 120 160" aria-hidden="true" style="color:var(--accent);"><use href="#ns-mark"/></svg>Needs Attention</h2>
          <span class="flagged-count">${data.flagged.length} flagged</span>
        </div>
        <div class="flagged-grid">
    `;
    for (const f of data.flagged) {
      const cls = f.severity === 'blocked' ? 'blocked' : 'attention';
      flagHtml += `
        <div class="flagged-item ${cls}">
          <span class="flag-emoji">${f.emoji}</span>
          <div class="flag-content">
            <div class="flag-title">${f.title}</div>
            <div class="flag-detail">${f.detail}</div>
            <div class="flag-since">Since ${formatSince(f.since)}</div>
          </div>
        </div>
      `;
    }
    flagHtml += '</div></div>';
    document.getElementById('flaggedSection').innerHTML = flagHtml;
  }

  // ── Newsletter Countdown ──
  if (data.newsletter) {
    const nl = data.newsletter;
    const days = daysUntilSunday();
    const isDone = nl.status === 'done';
    const statusLabel = isDone
      ? '<span class="done">✅ Done</span>'
      : '<span class="pending">⏳ In Progress</span>';
    const countdownText = days === 0
      ? '<strong>Sends TODAY</strong>'
      : `<strong>${days} day${days !== 1 ? 's' : ''}</strong> until Sunday send`;

    document.getElementById('newsletterBar').innerHTML = `
      <div class="newsletter-bar">
        <svg class="ns-mark-svg" viewBox="0 0 120 160" aria-hidden="true" style="color:var(--accent); width:16px; height:22px;"><use href="#ns-mark"/></svg>
        <div>
          <div class="nl-label">This Week's Newsletter</div>
          <div class="nl-status">${statusLabel} — ${nl.topic || 'Topic TBD'}</div>
          ${nl.note ? `<div style="font-size:12px;color:var(--mute);margin-top:4px;letter-spacing:-0.005em;">${nl.note}</div>` : ''}
        </div>
        <div class="nl-countdown">${countdownText}</div>
      </div>
    `;
  }

  // ── Summary Bar ──
  let totalProjects = 0;
  let totalAttn = 0;
  for (const s of data.sections) {
    for (const p of s.projects) {
      totalProjects++;
      if (p.needsAttention) totalAttn++;
    }
  }
  const flaggedCount = data.flagged ? data.flagged.length : 0;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><div class="summary-value">${totalProjects}</div><div class="summary-label">Projects</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:${flaggedCount > 0 ? 'var(--red)' : 'var(--ink)'}">${flaggedCount}</div><div class="summary-label">Flagged</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:${totalAttn > 0 ? 'var(--accent)' : 'var(--ink)'}">${totalAttn}</div><div class="summary-label">Needs Attention</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:var(--green)">${totalProjects - totalAttn}</div><div class="summary-label">On Track</div></div>
  `;

  // ── Sections ──
  let sectionsHtml = '';
  for (const section of data.sections) {
    sectionsHtml += `<div class="section">`;
    sectionsHtml += `<div class="section-header"><svg class="ns-mark-svg" viewBox="0 0 120 160" aria-hidden="true"><use href="#ns-mark"/></svg>${section.name}</div>`;
    sectionsHtml += `<div class="card-grid">`;

    for (const p of section.projects) {
      const statusClass = p.status === 'blocked' ? 'blocked' : p.status === 'attention' ? 'attention' : '';
      const dotClass = p.status;
      const lastUp = new Date(p.lastUpdated + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });

      let attnHtml = '';
      if (p.needsAttention) {
        attnHtml = `<div class="card-attention">${p.needsAttention}</div>`;
      }

      let bulletsHtml = '<ul class="card-bullets">';
      for (const b of p.bullets) {
        bulletsHtml += `<li>${b}</li>`;
      }
      bulletsHtml += '</ul>';

      sectionsHtml += `
        <div class="card ${statusClass}">
          <div class="card-header">
            <div class="card-title">
              <span class="emoji">${p.emoji}</span>
              <h3>${p.title}</h3>
            </div>
            <div class="status-dot ${dotClass}" title="${p.status}"></div>
          </div>
          <div class="card-meta">Updated ${lastUp}</div>
          ${bulletsHtml}
          ${attnHtml}
        </div>
      `;
    }

    sectionsHtml += '</div></div>';
  }

  document.getElementById('sections').innerHTML = sectionsHtml;

  // ── Open Commitments Section ── (disabled 2026-04-21 - Rameez handles filtering)

  // ── Sites Section ──
  if (data.sites && data.sites.groups && data.sites.groups.length > 0) {
    const s = data.sites;
    const domains = Object.entries(s.domains || {}).map(([d, reg]) => `${d} (${reg})`).join(' · ');
    let sitesHtml = `
      <div class="sites-section">
        <div class="sites-section-header">
          <h2><svg class="ns-mark-svg" viewBox="0 0 120 160" aria-hidden="true"><use href="#ns-mark"/></svg>Sites &amp; Subdomains</h2>
          <div class="sites-meta">${s.totalCount} live · ${domains}</div>
        </div>
    `;
    for (const g of s.groups) {
      sitesHtml += `
        <div class="sites-group">
          <div class="sites-group-label">${g.label}<span class="sites-group-count">${g.count}</span></div>
          <div class="sites-grid">
      `;
      for (const site of g.sites) {
        const statusClass = site.status || 'live';
        const cardClass = ['building','staging','draft'].includes(statusClass) ? statusClass : '';
        const deployed = site.deployed ? formatSince(site.deployed) : '';
        sitesHtml += `
          <div class="site-card ${cardClass}">
            <div class="site-sub">
              <a class="site-link" href="https://${site.subdomain}" target="_blank" rel="noopener">${site.subdomain}</a>
              <span class="site-status ${statusClass}">${statusClass}</span>
            </div>
            <div class="site-purpose">${site.purpose || ''}</div>
            <div class="site-meta">
              ${site.stack ? `<span>${site.stack}</span>` : ''}
              ${deployed ? `<span class="dot">·</span><span>Shipped ${deployed}</span>` : ''}
              ${site.owner ? `<span class="dot">·</span><span>${site.owner}</span>` : ''}
            </div>
          </div>
        `;
      }
      sitesHtml += '</div></div>';
    }
    sitesHtml += '</div>';
    document.getElementById('sections').insertAdjacentHTML('beforeend', sitesHtml);
  }

  // ── Newsletter Section (Sharma list via api.newsletter.nik.co) ──
  renderNewsletter().catch(e => console.warn('newsletter render failed', e));
}

const NL_API_BASE = 'https://api.newsletter.nik.co';

function nlFmt(n) {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US');
}
function nlPct(whole, part) {
  if (!whole) return 0;
  return Math.round((part / whole) * 1000) / 10;
}
function nlAgo(ts) {
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  if (Number.isNaN(d)) return '';
  const mins = Math.floor(d / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 14) return `${days}d ago`;
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function nlRenderChart(monthsAll) {
  // Take last 24 months for density. Fall back gracefully.
  const months = (monthsAll || []).slice(-24);
  if (!months.length) return '<div class="nl-empty">No growth history available.</div>';

  const W = 760, H = 180, padL = 36, padR = 12, padT = 16, padB = 28;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const maxVal = Math.max(...months.map(m => m.signups), 1);
  const barSpace = innerW / months.length;
  const barW = Math.max(barSpace * 0.62, 3);

  const bars = months.map((m, i) => {
    const h = Math.max((m.signups / maxVal) * innerH, 1);
    const x = padL + i * barSpace + (barSpace - barW) / 2;
    const y = padT + innerH - h;
    const isCurrent = i === months.length - 1;
    return `<rect class="bar ${isCurrent ? 'current' : ''}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="1.5"><title>${m.month}: ${m.signups.toLocaleString()} signups</title></rect>`;
  }).join('');

  // Axis ticks — first, mid, last
  const pickTicks = [0, Math.floor(months.length / 2), months.length - 1];
  const xLabels = pickTicks.map(i => {
    const x = padL + i * barSpace + barSpace / 2;
    return `<text class="label" x="${x.toFixed(1)}" y="${(H - 10).toFixed(1)}" text-anchor="middle">${months[i].month}</text>`;
  }).join('');

  const yTop = `<text class="value" x="${padL - 6}" y="${(padT + 10).toFixed(1)}" text-anchor="end">${maxVal.toLocaleString()}</text>`;
  const yBot = `<text class="value" x="${padL - 6}" y="${(padT + innerH).toFixed(1)}" text-anchor="end">0</text>`;
  const axis = `<line class="axis" x1="${padL}" y1="${padT + innerH}" x2="${W - padR}" y2="${padT + innerH}" />`;

  return `<svg class="nl-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Monthly signups">${axis}${bars}${yTop}${yBot}${xLabels}</svg>`;
}

async function renderNewsletter() {
  const root = document.getElementById('newsletterSection');
  if (!root) return;
  const bust = Date.now();
  let stats = null, caps = null, srcs = null;
  try {
    const [sR, cR, srR] = await Promise.allSettled([
      fetch(`${NL_API_BASE}/api/newsletter/stats?t=${bust}`).then(r => r.json()),
      fetch(`${NL_API_BASE}/api/newsletter/captures?days=30&t=${bust}`).then(r => r.json()),
      fetch(`${NL_API_BASE}/api/newsletter/sources?t=${bust}`).then(r => r.json()),
    ]);
    if (sR.status === 'fulfilled' && sR.value.ok) stats = sR.value;
    if (cR.status === 'fulfilled' && cR.value.ok) caps = cR.value;
    if (srR.status === 'fulfilled' && srR.value.ok) srcs = srR.value;
  } catch (e) {
    root.innerHTML = `<div class="nl-section"><div class="nl-section-header"><h2><svg class="ns-mark-svg" viewBox="0 0 120 160" aria-hidden="true"><use href="#ns-mark"/></svg>Newsletter</h2></div><div class="nl-error">Couldn’t reach api.newsletter.nik.co — ${String(e).slice(0, 120)}</div></div>`;
    return;
  }
  if (!stats) {
    root.innerHTML = `<div class="nl-section"><div class="nl-section-header"><h2><svg class="ns-mark-svg" viewBox="0 0 120 160" aria-hidden="true"><use href="#ns-mark"/></svg>Newsletter</h2></div><div class="nl-error">Stats unavailable from api.newsletter.nik.co</div></div>`;
    return;
  }

  // Hero deltas
  const delta = stats.delta_new;
  const deltaPct = stats.delta_pct;
  const deltaCls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
  const deltaSign = delta > 0 ? '+' : '';
  const deltaLabel = deltaPct === null || deltaPct === undefined
    ? `${deltaSign}${nlFmt(delta)}`
    : `${deltaSign}${nlFmt(delta)} · ${deltaSign}${deltaPct}%`;

  const emailablePct = stats.total > 0 ? Math.round((stats.emailable / stats.total) * 100) : 0;
  const activePct = stats.emailable > 0 ? Math.round((stats.active / stats.emailable) * 100) : 0;

  // Stacked engagement calc — based on emailable cohort
  const baseCohort = Math.max(stats.active + stats.passive + stats.disengaged + (stats.dormant || 0), 1);
  const seg = k => Math.max((stats[k] || 0) / baseCohort * 100, 0);

  // Sources — prefer our capture log if it has data, otherwise Sailthru lifetime sources.
  let sourceRows = [];
  if (srcs && srcs.sources && srcs.sources.length) {
    const maxC = srcs.sources[0].count;
    sourceRows = srcs.sources.slice(0, 10).map(s => ({
      name: s.source,
      count: s.count,
      widthPct: Math.max((s.count / maxC) * 100, 4),
      last: s.last_capture,
    }));
  } else if (stats.sources_top && stats.sources_top.length) {
    const maxC = stats.sources_top[0].count;
    sourceRows = stats.sources_top.slice(0, 10).map(s => ({
      name: s.source,
      count: s.count,
      widthPct: Math.max((s.count / maxC) * 100, 4),
      last: null,
    }));
  }

  const VIP_DOMAINS = ['nik.co','sequoiacap.com','a16z.com','ycombinator.com','y-combinator.com','techcrunch.com','stripe.com','firstround.com'];
  const isVip = email => VIP_DOMAINS.some(d => email && (email.endsWith('@'+d) || email.endsWith('.'+d)));

  // Build HTML
  const lastSend = stats.meta && stats.meta.last_send ? new Date(stats.meta.last_send).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';
  const currentMonth = stats.current_month || '';

  let html = `
    <div class="nl-section">
      <div class="nl-section-header">
        <h2><svg class="ns-mark-svg" viewBox="0 0 120 160" aria-hidden="true"><use href="#ns-mark"/></svg>Newsletter</h2>
        <div class="nl-section-meta"><span class="nl-dot"></span>Sharma list · last send ${lastSend}</div>
      </div>

      <div class="nl-hero-grid">
        <div class="nl-hero">
          <div class="nl-hero-label">Total subs</div>
          <div class="nl-hero-value">${nlFmt(stats.total)}</div>
          <div class="nl-hero-sub">All-time</div>
        </div>
        <div class="nl-hero">
          <div class="nl-hero-label">Emailable</div>
          <div class="nl-hero-value">${nlFmt(stats.emailable)}</div>
          <div class="nl-hero-sub">${emailablePct}% of total</div>
        </div>
        <div class="nl-hero">
          <div class="nl-hero-label">Active</div>
          <div class="nl-hero-value">${nlFmt(stats.active)}</div>
          <div class="nl-hero-sub">${activePct}% of emailable</div>
        </div>
        <div class="nl-hero">
          <div class="nl-hero-label">New · ${currentMonth}</div>
          <div class="nl-hero-value">${nlFmt(stats.new_this_period)}</div>
          <div class="nl-hero-sub">vs prior <span class="nl-hero-delta ${deltaCls}">${deltaLabel}</span></div>
        </div>
      </div>

      <div class="nl-block">
        <div class="nl-block-title">Monthly signups <span class="nl-block-note">Last 24 months</span></div>
        ${nlRenderChart(stats.signup_month)}
      </div>

      <div class="nl-block">
        <div class="nl-block-title">Engagement mix <span class="nl-block-note">${nlFmt(baseCohort)} classified</span></div>
        <div class="nl-stack-wrap">
          <div class="nl-stack-bar">
            <div class="nl-stack-seg active" style="width:${seg('active').toFixed(2)}%"></div>
            <div class="nl-stack-seg passive" style="width:${seg('passive').toFixed(2)}%"></div>
            <div class="nl-stack-seg disengaged" style="width:${seg('disengaged').toFixed(2)}%"></div>
            <div class="nl-stack-seg dormant" style="width:${seg('dormant').toFixed(2)}%"></div>
          </div>
          <div class="nl-stack-legend">
            <span><span class="sw" style="background:var(--nl-violet)"></span>Active<span class="count">${nlFmt(stats.active)}</span><span class="pct">${nlPct(baseCohort, stats.active)}%</span></span>
            <span><span class="sw" style="background:rgba(94,91,231,0.55)"></span>Passive<span class="count">${nlFmt(stats.passive)}</span><span class="pct">${nlPct(baseCohort, stats.passive)}%</span></span>
            <span><span class="sw" style="background:rgba(94,91,231,0.28)"></span>Disengaged<span class="count">${nlFmt(stats.disengaged)}</span><span class="pct">${nlPct(baseCohort, stats.disengaged)}%</span></span>
            ${stats.dormant ? `<span><span class="sw" style="background:rgba(17,17,17,0.12)"></span>Dormant<span class="count">${nlFmt(stats.dormant)}</span><span class="pct">${nlPct(baseCohort, stats.dormant)}%</span></span>` : ''}
          </div>
        </div>
      </div>
  `;

  // Sources block
  if (sourceRows.length) {
    html += `
      <div class="nl-block">
        <div class="nl-block-title">Top sources <span class="nl-block-note">${srcs && srcs.sources && srcs.sources.length ? 'Last 30 days' : 'Lifetime (Sailthru)'}</span></div>
        <table class="nl-table">
          <thead><tr><th>Source</th><th></th><th class="num">Signups</th><th class="num">Last</th></tr></thead>
          <tbody>
            ${sourceRows.map(r => `
              <tr>
                <td><span class="src-name">${r.name}</span></td>
                <td style="width:35%"><span class="nl-source-bar" style="width:${r.widthPct.toFixed(1)}%"></span></td>
                <td class="num">${nlFmt(r.count)}</td>
                <td class="num"><span class="ago">${r.last ? nlAgo(r.last) : '—'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;
  } else {
    html += `<div class="nl-block"><div class="nl-block-title">Top sources</div><div class="nl-empty">No source data yet — captures will populate here once live.</div></div>`;
  }

  // Latest captures
  const latest = (caps && caps.latest) || [];
  if (latest.length) {
    html += `
      <div class="nl-block">
        <div class="nl-block-title">Latest captures <span class="nl-block-note">Last 10</span></div>
        <table class="nl-table">
          <thead><tr><th>Email</th><th>Source</th><th class="num">When</th></tr></thead>
          <tbody>
            ${latest.map(c => `
              <tr>
                <td class="mono ${isVip(c.email) ? 'nl-latest-vip' : ''}">${c.email}${isVip(c.email) ? ' ★' : ''}</td>
                <td>${c.source}</td>
                <td class="num"><span class="ago">${nlAgo(c.ts)}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;
  } else {
    html += `<div class="nl-block"><div class="nl-block-title">Latest captures</div><div class="nl-empty">No captures in the last 30 days.</div></div>`;
  }

  html += `</div>`;
  root.innerHTML = html;

  // Stash hero stats into dashboard-data for downstream consumers.
  window.__nlHero = {
    total: stats.total,
    emailable: stats.emailable,
    active: stats.active,
    new_this_period: stats.new_this_period,
    current_month: stats.current_month,
    ts: stats.ts,
  };
}
</script>
</body>
</html>
