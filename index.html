<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Command Center</title>
<meta name="description" content="Nik Sharma's operational command center">
<meta property="og:title" content="⚡ Command Center">
<meta property="og:description" content="Operational command center — all projects at a glance">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dash.nik.co">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="⚡ Command Center">
<meta name="twitter:description" content="Operational command center — all projects at a glance">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Command Center">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --text: #ffffff;
  --text-secondary: #a6a6a6;
  --text-tertiary: rgba(255,255,255,0.6);
  --text-muted: rgba(255,255,255,0.4);
  --accent: #fbbf24;
  --accent-hover: #fcd34d;
  --accent-glow: rgba(251,191,36,0.15);
  --accent-muted: rgba(251,191,36,0.1);
  --border: rgba(255,255,255,0.05);
  --border-std: rgba(255,255,255,0.08);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.15);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.15);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.15);
  --blue: #60a5fa;
  --blue-bg: rgba(59,130,246,0.15);
  --frosted: rgba(255,255,255,0.1);
  --subtle: rgba(255,255,255,0.05);
  font-family: 'Inter var', 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  font-feature-settings: "cv01", "cv05", "cv09", "cv11", "ss03", "ss07";
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

/* Passcode */
#passcode-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:24px;
}
#passcode-overlay.hidden { display:none; }
#passcode-overlay h2 { font-size:24px; font-weight:600; letter-spacing:-1px; color:var(--text); }
#passcode-overlay p { font-size:13px; color:var(--text-secondary); }
#passcode-input {
  background:var(--surface); border:1px solid var(--border-std); border-radius:12px;
  padding:12px 20px; font-size:24px; letter-spacing:12px; text-align:center;
  color:var(--text); width:200px; outline:none; font-family:inherit;
}
#passcode-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
#passcode-error { color:var(--red); font-size:13px; display:none; }

/* App */
.app { display:none; max-width:1200px; margin:0 auto; padding:32px 24px 80px; }
.app.visible { display:block; }

/* Header */
.header { margin-bottom:32px; display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.header h1 { font-size:40px; font-weight:700; letter-spacing:-2px; }
.header .subtitle { font-size:13px; color:var(--text-muted); }

/* Summary bar */
.summary-bar {
  display:flex; gap:20px; margin-bottom:32px; padding:20px 24px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  flex-wrap:wrap; align-items:center;
}
.summary-stat { }
.summary-value { font-size:28px; font-weight:700; letter-spacing:-1px; color:var(--text); }
.summary-label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-top:2px; }
.summary-divider { width:1px; background:var(--border-std); margin:0 4px; align-self:stretch; }

/* Flagged Section */
.flagged-section { margin-bottom:32px; }
.flagged-header {
  display:flex; align-items:center; gap:10px; margin-bottom:16px;
}
.flagged-header h2 {
  font-size:24px; font-weight:600; letter-spacing:-0.5px; color:var(--red);
}
.flagged-count {
  background:var(--red-bg); color:var(--red); font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:40px; text-transform:uppercase; letter-spacing:0.5px;
}
.flagged-grid {
  display:grid; grid-template-columns:1fr; gap:12px;
}
.flagged-item {
  background:var(--surface); border:1px solid rgba(239,68,68,0.2); border-radius:12px;
  padding:16px 20px; display:flex; align-items:flex-start; gap:14px;
  transition: border-color 0.2s;
}
.flagged-item.blocked { border-color:rgba(239,68,68,0.35); box-shadow:rgba(239,68,68,0.1) 0px 0px 0px 1px; }
.flagged-item.attention { border-color:rgba(251,191,36,0.3); box-shadow:var(--accent-glow) 0px 0px 0px 1px; }
.flagged-item .flag-emoji { font-size:20px; flex-shrink:0; padding-top:1px; }
.flagged-item .flag-content { flex:1; min-width:0; }
.flagged-item .flag-title { font-size:15px; font-weight:600; letter-spacing:-0.3px; margin-bottom:4px; }
.flagged-item .flag-detail { font-size:13px; color:var(--text-secondary); line-height:1.5; }
.flagged-item .flag-since { font-size:11px; color:var(--text-muted); margin-top:6px; text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }

/* Commitments section */
.commitments-section { margin-top: 40px; }
.commitments-section-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-std); }
.commitments-section-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.commitments-section-header .cmt-stats { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; display:flex; gap: 12px; }
.commitments-section-header .cmt-stats strong { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
.commitments-section-header .cmt-stats .cmt-stat-overdue strong { color: var(--red); }
.commitments-section-header .cmt-stats .cmt-stat-aging strong { color: var(--yellow); }
.commitments-list { display:flex; flex-direction: column; gap: 8px; }
.commitment-card { display:flex; gap:12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; transition: border-color .12s ease; }
.commitment-card.overdue { border-color: rgba(239,68,68,0.30); box-shadow: rgba(239,68,68,0.08) 0px 0px 0px 1px; }
.commitment-card.aging { border-color: rgba(251,191,36,0.25); }
.cmt-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; height: fit-content; white-space: nowrap; }
.cmt-badge.open { background: var(--subtle); color: var(--text-secondary); }
.cmt-badge.aging { background: var(--yellow-bg); color: var(--yellow); }
.cmt-badge.overdue { background: var(--red-bg); color: var(--red); }
.cmt-body { flex: 1; min-width: 0; }
.cmt-sentence { font-size: 14px; color: var(--text); line-height: 1.45; margin-bottom: 4px; font-style: italic; }
.cmt-meta { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; display:flex; flex-wrap:wrap; gap: 8px; }
.cmt-meta .dot { opacity: 0.6; }
.cmt-meta a { color: var(--accent); text-decoration: none; }
.cmt-empty { padding: 20px; text-align: center; color: var(--text-tertiary); font-size: 13px; background: var(--surface); border: 1px dashed var(--border-std); border-radius: 10px; }

/* Sites section */
.sites-section { margin-top: 48px; }
.sites-section-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-std); }
.sites-section-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.sites-section-header .sites-meta { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.sites-group { margin-bottom: 28px; }
.sites-group-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); font-weight: 600; margin-bottom: 10px; display:flex; align-items:center; gap:8px; }
.sites-group-count { background: var(--subtle); color: var(--text-secondary); padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; letter-spacing: 0; }
.sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
.site-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; transition: border-color .12s ease, transform .12s ease; }
.site-card:hover { border-color: var(--border-std); transform: translateY(-1px); }
.site-card.building { border-color: rgba(251,191,36,0.25); box-shadow: var(--accent-glow) 0px 0px 0px 1px; }
.site-card.staging { border-color: rgba(96,165,250,0.25); }
.site-card.draft { opacity: 0.72; }
.site-sub { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom: 4px; }
.site-link { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; color: var(--accent); text-decoration: none; font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace; }
.site-link:hover { color: var(--accent-hover); }
.site-status { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px; }
.site-status.live { background: var(--green-bg); color: var(--green); }
.site-status.building { background: var(--yellow-bg); color: var(--yellow); }
.site-status.staging { background: var(--blue-bg); color: var(--blue); }
.site-status.draft { background: var(--subtle); color: var(--text-secondary); }
.site-purpose { font-size: 12px; color: var(--text-secondary); line-height: 1.45; margin-bottom: 6px; }
.site-meta { display:flex; flex-wrap:wrap; gap: 8px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.site-meta span { display:inline-block; }
.site-meta .dot { color: var(--text-muted); }

/* Newsletter countdown */
.newsletter-bar {
  margin-bottom:32px; padding:16px 20px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.newsletter-bar .nl-icon { font-size:20px; }
.newsletter-bar .nl-label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
.newsletter-bar .nl-status { font-size:15px; font-weight:500; color:var(--text); }
.newsletter-bar .nl-status .done { color:var(--green); }
.newsletter-bar .nl-status .pending { color:var(--yellow); }
.newsletter-bar .nl-countdown {
  margin-left:auto; font-size:13px; color:var(--text-tertiary); font-weight:500;
}
.newsletter-bar .nl-countdown strong { color:var(--accent); font-weight:700; }

/* Section headers */
.section { margin-bottom:32px; }
.section-header {
  font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px;
  color:var(--text-muted); margin-bottom:16px; padding-left:4px;
  border-left:2px solid var(--accent); padding-left:12px;
}

/* Grid */
.card-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:16px;
}
@media (max-width:1024px) { .card-grid { grid-template-columns:repeat(2, 1fr); } }
@media (max-width:640px) { .card-grid { grid-template-columns:1fr; } }

/* Cards */
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:20px; transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color:var(--border-std); }
.card.attention { border-color:rgba(251,191,36,0.3); box-shadow:var(--accent-glow) 0px 0px 0px 1px; }
.card.blocked { border-color:rgba(239,68,68,0.3); box-shadow:rgba(239,68,68,0.15) 0px 0px 0px 1px; }

.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.card-title { display:flex; align-items:center; gap:8px; }
.card-title .emoji { font-size:20px; }
.card-title h3 { font-size:16px; font-weight:600; letter-spacing:-0.5px; }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-dot.on-track { background:var(--green); }
.status-dot.attention { background:var(--yellow); }
.status-dot.blocked { background:var(--red); }

.card-meta { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:500; margin-bottom:12px; }

.card-bullets { list-style:none; padding:0; }
.card-bullets li {
  font-size:13px; line-height:1.55; color:var(--text-secondary);
  padding:3px 0 3px 14px; position:relative;
}
.card-bullets li::before {
  content:''; position:absolute; left:0; top:10px;
  width:4px; height:4px; border-radius:50%; background:var(--text-muted);
}

.card-attention {
  margin-top:12px; padding:10px 12px; border-radius:8px;
  background:var(--yellow-bg); font-size:12px; font-weight:500;
  color:var(--yellow); line-height:1.5;
}

/* Theme toggle */
.theme-toggle {
  position:fixed; top:16px; right:16px; z-index:100;
  background:var(--frosted); border:1px solid var(--border-std);
  border-radius:40px; padding:8px 12px; cursor:pointer;
  font-size:16px; line-height:1; color:var(--text);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:all 0.2s;
}
.theme-toggle:hover { background:var(--accent-glow); border-color:var(--accent); }
</style>
</head>
<body>
<div id="passcode-overlay">
  <h2>⚡ Command Center</h2>
  <p>Enter passcode to continue</p>
  <input type="password" id="passcode-input" maxlength="4" inputmode="numeric" autocomplete="off" autofocus>
  <p id="passcode-error">Invalid passcode</p>
</div>

<button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>

<div class="app" id="app">
  <div class="header">
    <h1>⚡ Command Center</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>
  <div id="flaggedSection"></div>
  <div id="newsletterBar"></div>
  <div class="summary-bar" id="summaryBar"></div>
  <div id="sections"></div>
</div>

<script>
const PASSCODE_HASH = '490d3f320e422627a4988064d699dd4e4e26436aecbbb15952d964ffc12918b8';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Passcode
const overlay = document.getElementById('passcode-overlay');
const input = document.getElementById('passcode-input');
const error = document.getElementById('passcode-error');

if (sessionStorage.getItem('dash-auth') === 'true') {
  overlay.classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadData();
}

input.addEventListener('input', async () => {
  error.style.display = 'none';
  if (input.value.length === 4) {
    const hash = await sha256(input.value);
    if (hash === PASSCODE_HASH) {
      sessionStorage.setItem('dash-auth', 'true');
      overlay.classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      loadData();
    } else {
      error.style.display = 'block';
      input.value = '';
      input.focus();
    }
  }
});

async function loadData() {
  try {
    const res = await fetch('dashboard-data.json?t=' + Date.now());
    const data = await res.json();
    render(data);
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

function daysUntilSunday() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  if (day === 0) return 0;
  return 7 - day;
}

function formatSince(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function render(data) {
  // Subtitle
  const refreshed = new Date(data.lastRefreshed).toLocaleDateString('en-US', {
    month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  document.getElementById('subtitle').textContent = `Last refreshed: ${refreshed}`;

  // ── Flagged Section ──
  if (data.flagged && data.flagged.length > 0) {
    let flagHtml = `
      <div class="flagged-section">
        <div class="flagged-header">
          <h2>🚩 Needs Attention</h2>
          <span class="flagged-count">${data.flagged.length} flagged</span>
        </div>
        <div class="flagged-grid">
    `;
    for (const f of data.flagged) {
      const cls = f.severity === 'blocked' ? 'blocked' : 'attention';
      flagHtml += `
        <div class="flagged-item ${cls}">
          <span class="flag-emoji">${f.emoji}</span>
          <div class="flag-content">
            <div class="flag-title">${f.title}</div>
            <div class="flag-detail">${f.detail}</div>
            <div class="flag-since">Since ${formatSince(f.since)}</div>
          </div>
        </div>
      `;
    }
    flagHtml += '</div></div>';
    document.getElementById('flaggedSection').innerHTML = flagHtml;
  }

  // ── Newsletter Countdown ──
  if (data.newsletter) {
    const nl = data.newsletter;
    const days = daysUntilSunday();
    const isDone = nl.status === 'done';
    const statusLabel = isDone
      ? '<span class="done">✅ Done</span>'
      : '<span class="pending">⏳ In Progress</span>';
    const countdownText = days === 0
      ? '<strong>Sends TODAY</strong>'
      : `<strong>${days} day${days !== 1 ? 's' : ''}</strong> until Sunday send`;

    document.getElementById('newsletterBar').innerHTML = `
      <div class="newsletter-bar">
        <span class="nl-icon">📰</span>
        <div>
          <div class="nl-label">This Week's Newsletter</div>
          <div class="nl-status">${statusLabel} — ${nl.topic || 'Topic TBD'}</div>
          ${nl.note ? `<div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">${nl.note}</div>` : ''}
        </div>
        <div class="nl-countdown">${countdownText}</div>
      </div>
    `;
  }

  // ── Summary Bar ──
  let totalProjects = 0;
  let totalAttn = 0;
  for (const s of data.sections) {
    for (const p of s.projects) {
      totalProjects++;
      if (p.needsAttention) totalAttn++;
    }
  }
  const flaggedCount = data.flagged ? data.flagged.length : 0;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><div class="summary-value">${totalProjects}</div><div class="summary-label">Projects</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:${flaggedCount > 0 ? 'var(--red)' : 'var(--green)'}">${flaggedCount}</div><div class="summary-label">Flagged</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:${totalAttn > 0 ? 'var(--yellow)' : 'var(--green)'}">${totalAttn}</div><div class="summary-label">Needs Attention</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:var(--green)">${totalProjects - totalAttn}</div><div class="summary-label">On Track</div></div>
  `;

  // ── Sections ──
  let sectionsHtml = '';
  for (const section of data.sections) {
    sectionsHtml += `<div class="section">`;
    sectionsHtml += `<div class="section-header">${section.name}</div>`;
    sectionsHtml += `<div class="card-grid">`;

    for (const p of section.projects) {
      const statusClass = p.status === 'blocked' ? 'blocked' : p.status === 'attention' ? 'attention' : '';
      const dotClass = p.status;
      const lastUp = new Date(p.lastUpdated + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });

      let attnHtml = '';
      if (p.needsAttention) {
        attnHtml = `<div class="card-attention">⚠️ ${p.needsAttention}</div>`;
      }

      let bulletsHtml = '<ul class="card-bullets">';
      for (const b of p.bullets) {
        bulletsHtml += `<li>${b}</li>`;
      }
      bulletsHtml += '</ul>';

      sectionsHtml += `
        <div class="card ${statusClass}">
          <div class="card-header">
            <div class="card-title">
              <span class="emoji">${p.emoji}</span>
              <h3>${p.title}</h3>
            </div>
            <div class="status-dot ${dotClass}" title="${p.status}"></div>
          </div>
          <div class="card-meta">Updated ${lastUp}</div>
          ${bulletsHtml}
          ${attnHtml}
        </div>
      `;
    }

    sectionsHtml += '</div></div>';
  }

  document.getElementById('sections').innerHTML = sectionsHtml;

  // ── Open Commitments Section ── (disabled 2026-04-21 - Rameez handles filtering)
  if (false) try {
    const cRes = await fetch('https://fireflies.nik.co/api/commitments?t=' + Date.now());
    if (cRes.ok) {
      const cData = await cRes.json();
      const open = cData.commitments || [];
      const overdueCount = open.filter(c => c.status === 'overdue').length;
      const agingCount = open.filter(c => c.status === 'aging').length;
      let cHtml = `
        <div class="commitments-section">
          <div class="commitments-section-header">
            <h2>📝 Open Commitments</h2>
            <div class="cmt-stats">
              <div><strong>${open.length}</strong> open</div>
              ${agingCount ? `<div class="cmt-stat-aging"><strong>${agingCount}</strong> aging</div>` : ''}
              ${overdueCount ? `<div class="cmt-stat-overdue"><strong>${overdueCount}</strong> overdue</div>` : ''}
            </div>
          </div>
      `;
      if (open.length === 0) {
        cHtml += '<div class="cmt-empty">✨ Inbox zero on commitments. All follow-ups closed.</div>';
      } else {
        cHtml += '<div class="commitments-list">';
        for (const c of open.slice(0, 20)) {
          const status = c.status || 'open';
          const cardCls = status === 'overdue' ? 'overdue' : status === 'aging' ? 'aging' : '';
          const source = c.source || 'meeting';
          const sourceIcon = source === 'email' ? '📧' : '🎙️';
          const owed = c.owed_to && c.owed_to.length ? ` → ${c.owed_to.join(', ')}` : '';
          const mtg = c.meeting_title || 'meeting';
          const ageMs = Date.now() - new Date(c.created_at).getTime();
          const ageH = Math.floor(ageMs / 3600000);
          const ageLabel = ageH < 1 ? 'just now' : ageH < 24 ? `${ageH}h ago` : `${Math.floor(ageH/24)}d ago`;
          const linkLabel = source === 'email' ? 'open email' : 'transcript';
          const urgencyBadge = c.urgency === 'high' ? '<span class="cmt-badge overdue" style="margin-left:4px;">high</span>' : '';
          cHtml += `
            <div class="commitment-card ${cardCls}">
              <span class="cmt-badge ${status}">${sourceIcon} ${status}</span>
              <div class="cmt-body">
                <div class="cmt-sentence">“${c.sentence || ''}”${owed}${urgencyBadge}</div>
                <div class="cmt-meta">
                  <span>${mtg}</span>
                  <span class="dot">·</span>
                  <span>${ageLabel}</span>
                  ${c.transcript_url ? `<span class="dot">·</span><a href="${c.transcript_url}" target="_blank">${linkLabel}</a>` : ''}
                </div>
              </div>
            </div>
          `;
        }
        cHtml += '</div>';
      }
      cHtml += '</div>';
      document.getElementById('sections').insertAdjacentHTML('beforeend', cHtml);
    }
  } catch (e) { console.warn('commitments fetch failed', e); }

  // ── Sites Section ──
  if (data.sites && data.sites.groups && data.sites.groups.length > 0) {
    const s = data.sites;
    const domains = Object.entries(s.domains || {}).map(([d, reg]) => `${d} (${reg})`).join(' · ');
    let sitesHtml = `
      <div class="sites-section">
        <div class="sites-section-header">
          <h2>🌐 Sites &amp; Subdomains</h2>
          <div class="sites-meta">${s.totalCount} live · ${domains}</div>
        </div>
    `;
    for (const g of s.groups) {
      sitesHtml += `
        <div class="sites-group">
          <div class="sites-group-label">${g.label}<span class="sites-group-count">${g.count}</span></div>
          <div class="sites-grid">
      `;
      for (const site of g.sites) {
        const statusClass = site.status || 'live';
        const cardClass = ['building','staging','draft'].includes(statusClass) ? statusClass : '';
        const deployed = site.deployed ? formatSince(site.deployed) : '';
        sitesHtml += `
          <div class="site-card ${cardClass}">
            <div class="site-sub">
              <a class="site-link" href="https://${site.subdomain}" target="_blank" rel="noopener">${site.subdomain}</a>
              <span class="site-status ${statusClass}">${statusClass}</span>
            </div>
            <div class="site-purpose">${site.purpose || ''}</div>
            <div class="site-meta">
              ${site.stack ? `<span>${site.stack}</span>` : ''}
              ${deployed ? `<span class="dot">·</span><span>Shipped ${deployed}</span>` : ''}
              ${site.owner ? `<span class="dot">·</span><span>${site.owner}</span>` : ''}
            </div>
          </div>
        `;
      }
      sitesHtml += '</div></div>';
    }
    sitesHtml += '</div>';
    document.getElementById('sections').insertAdjacentHTML('beforeend', sitesHtml);
  }
}
</script>
</body>
</html>
