<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --text: #ffffff;
  --text-secondary: #a6a6a6;
  --text-tertiary: rgba(255,255,255,0.6);
  --text-muted: rgba(255,255,255,0.4);
  --accent: #fbbf24;
  --accent-hover: #fcd34d;
  --accent-glow: rgba(251,191,36,0.15);
  --accent-muted: rgba(251,191,36,0.1);
  --border: rgba(255,255,255,0.05);
  --border-std: rgba(255,255,255,0.08);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.15);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.15);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.15);
  --blue: #60a5fa;
  --blue-bg: rgba(59,130,246,0.15);
  --frosted: rgba(255,255,255,0.1);
  --subtle: rgba(255,255,255,0.05);
  font-family: 'Inter var', 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  font-feature-settings: "cv01", "cv05", "cv09", "cv11", "ss03", "ss07";
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

/* Passcode */
#passcode-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:24px;
}
#passcode-overlay.hidden { display:none; }
#passcode-overlay h2 { font-size:24px; font-weight:600; letter-spacing:-1px; color:var(--text); }
#passcode-overlay p { font-size:13px; color:var(--text-secondary); }
#passcode-input {
  background:var(--surface); border:1px solid var(--border-std); border-radius:12px;
  padding:12px 20px; font-size:24px; letter-spacing:12px; text-align:center;
  color:var(--text); width:200px; outline:none; font-family:inherit;
}
#passcode-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
#passcode-submit {
  background:var(--accent); color:#000; border:0; border-radius:10px;
  padding:14px 28px; font-size:15px; font-weight:600; cursor:pointer;
  letter-spacing:-0.01em; transition:background .15s ease, transform .05s ease;
  min-width:120px;
}
#passcode-submit:hover { background:var(--accent-hover); }
#passcode-submit:active { transform:scale(0.98); }
#passcode-submit:disabled { opacity:0.4; cursor:not-allowed; }
#passcode-error { color:var(--red); font-size:13px; display:none; }

/* App */
.app { display:none; max-width:1200px; margin:0 auto; padding:32px 24px 80px; }
.app.visible { display:block; }

/* Header */
.header { margin-bottom:32px; display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.header h1 { font-size:40px; font-weight:700; letter-spacing:-2px; }
.header .subtitle { font-size:13px; color:var(--text-muted); }

/* Summary bar */
.summary-bar {
  display:flex; gap:20px; margin-bottom:32px; padding:20px 24px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  flex-wrap:wrap; align-items:center;
}
.summary-stat { }
.summary-value { font-size:28px; font-weight:700; letter-spacing:-1px; color:var(--text); }
.summary-label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-top:2px; }
.summary-divider { width:1px; background:var(--border-std); margin:0 4px; align-self:stretch; }

/* Flagged Section */
.flagged-section { margin-bottom:32px; }
.flagged-header {
  display:flex; align-items:center; gap:10px; margin-bottom:16px;
}
.flagged-header h2 {
  font-size:24px; font-weight:600; letter-spacing:-0.5px; color:var(--red);
}
.flagged-count {
  background:var(--red-bg); color:var(--red); font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:40px; text-transform:uppercase; letter-spacing:0.5px;
}
.flagged-grid {
  display:grid; grid-template-columns:1fr; gap:12px;
}
.flagged-item {
  background:var(--surface); border:1px solid rgba(239,68,68,0.2); border-radius:12px;
  padding:16px 20px; display:flex; align-items:flex-start; gap:14px;
  transition: border-color 0.2s;
}
.flagged-item.blocked { border-color:rgba(239,68,68,0.35); box-shadow:rgba(239,68,68,0.1) 0px 0px 0px 1px; }
.flagged-item.attention { border-color:rgba(251,191,36,0.3); box-shadow:var(--accent-glow) 0px 0px 0px 1px; }
.flagged-item .flag-emoji { font-size:20px; flex-shrink:0; padding-top:1px; }
.flagged-item .flag-content { flex:1; min-width:0; }
.flagged-item .flag-title { font-size:15px; font-weight:600; letter-spacing:-0.3px; margin-bottom:4px; }
.flagged-item .flag-detail { font-size:13px; color:var(--text-secondary); line-height:1.5; }
.flagged-item .flag-since { font-size:11px; color:var(--text-muted); margin-top:6px; text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }

/* Commitments section */
.commitments-section { margin-top: 40px; }
.commitments-section-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-std); }
.commitments-section-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.commitments-section-header .cmt-stats { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; display:flex; gap: 12px; }
.commitments-section-header .cmt-stats strong { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
.commitments-section-header .cmt-stats .cmt-stat-overdue strong { color: var(--red); }
.commitments-section-header .cmt-stats .cmt-stat-aging strong { color: var(--yellow); }
.commitments-list { display:flex; flex-direction: column; gap: 8px; }
.commitment-card { display:flex; gap:12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; transition: border-color .12s ease; }
.commitment-card.overdue { border-color: rgba(239,68,68,0.30); box-shadow: rgba(239,68,68,0.08) 0px 0px 0px 1px; }
.commitment-card.aging { border-color: rgba(251,191,36,0.25); }
.cmt-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; height: fit-content; white-space: nowrap; }
.cmt-badge.open { background: var(--subtle); color: var(--text-secondary); }
.cmt-badge.aging { background: var(--yellow-bg); color: var(--yellow); }
.cmt-badge.overdue { background: var(--red-bg); color: var(--red); }
.cmt-body { flex: 1; min-width: 0; }
.cmt-sentence { font-size: 14px; color: var(--text); line-height: 1.45; margin-bottom: 4px; font-style: italic; }
.cmt-meta { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; display:flex; flex-wrap:wrap; gap: 8px; }
.cmt-meta .dot { opacity: 0.6; }
.cmt-meta a { color: var(--accent); text-decoration: none; }
.cmt-empty { padding: 20px; text-align: center; color: var(--text-tertiary); font-size: 13px; background: var(--surface); border: 1px dashed var(--border-std); border-radius: 10px; }

/* Sites section */
.sites-section { margin-top: 48px; }
.sites-section-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-std); }
.sites-section-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.sites-section-header .sites-meta { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.sites-group { margin-bottom: 28px; }
.sites-group-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); font-weight: 600; margin-bottom: 10px; display:flex; align-items:center; gap:8px; }
.sites-group-count { background: var(--subtle); color: var(--text-secondary); padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; letter-spacing: 0; }
.sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
.site-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; transition: border-color .12s ease, transform .12s ease; }
.site-card:hover { border-color: var(--border-std); transform: translateY(-1px); }
.site-card.building { border-color: rgba(251,191,36,0.25); box-shadow: var(--accent-glow) 0px 0px 0px 1px; }
.site-card.staging { border-color: rgba(96,165,250,0.25); }
.site-card.draft { opacity: 0.72; }
.site-sub { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom: 4px; }
.site-link { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; color: var(--accent); text-decoration: none; font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace; }
.site-link:hover { color: var(--accent-hover); }
.site-status { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px; }
.site-status.live { background: var(--green-bg); color: var(--green); }
.site-status.building { background: var(--yellow-bg); color: var(--yellow); }
.site-status.staging { background: var(--blue-bg); color: var(--blue); }
.site-status.draft { background: var(--subtle); color: var(--text-secondary); }
.site-purpose { font-size: 12px; color: var(--text-secondary); line-height: 1.45; margin-bottom: 6px; }
.site-meta { display:flex; flex-wrap:wrap; gap: 8px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.site-meta span { display:inline-block; }
.site-meta .dot { color: var(--text-muted); }

/* Newsletter countdown */
.newsletter-bar {
  margin-bottom:32px; padding:16px 20px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.newsletter-bar .nl-icon { font-size:20px; }
.newsletter-bar .nl-label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
.newsletter-bar .nl-status { font-size:15px; font-weight:500; color:var(--text); }
.newsletter-bar .nl-status .done { color:var(--green); }
.newsletter-bar .nl-status .pending { color:var(--yellow); }
.newsletter-bar .nl-countdown {
  margin-left:auto; font-size:13px; color:var(--text-tertiary); font-weight:500;
}
.newsletter-bar .nl-countdown strong { color:var(--accent); font-weight:700; }

/* Section headers */
.section { margin-bottom:32px; }
.section-header {
  font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px;
  color:var(--text-muted); margin-bottom:16px; padding-left:4px;
  border-left:2px solid var(--accent); padding-left:12px;
}

/* Grid */
.card-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:16px;
}
@media (max-width:1024px) { .card-grid { grid-template-columns:repeat(2, 1fr); } }
@media (max-width:640px) { .card-grid { grid-template-columns:1fr; } }

/* Cards */
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:20px; transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color:var(--border-std); }
.card.attention { border-color:rgba(251,191,36,0.3); box-shadow:var(--accent-glow) 0px 0px 0px 1px; }
.card.blocked { border-color:rgba(239,68,68,0.3); box-shadow:rgba(239,68,68,0.15) 0px 0px 0px 1px; }

.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.card-title { display:flex; align-items:center; gap:8px; }
.card-title .emoji { font-size:20px; }
.card-title h3 { font-size:16px; font-weight:600; letter-spacing:-0.5px; }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-dot.on-track { background:var(--green); }
.status-dot.attention { background:var(--yellow); }
.status-dot.blocked { background:var(--red); }

.card-meta { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:500; margin-bottom:12px; }

.card-bullets { list-style:none; padding:0; }
.card-bullets li {
  font-size:13px; line-height:1.55; color:var(--text-secondary);
  padding:3px 0 3px 14px; position:relative;
}
.card-bullets li::before {
  content:''; position:absolute; left:0; top:10px;
  width:4px; height:4px; border-radius:50%; background:var(--text-muted);
}

.card-attention {
  margin-top:12px; padding:10px 12px; border-radius:8px;
  background:var(--yellow-bg); font-size:12px; font-weight:500;
  color:var(--yellow); line-height:1.5;
}

/* Newsletter (Sharma list) — violet accent, editorial spacing */
:root {
  --nl-violet: #5E5BE7;
  --nl-violet-soft: rgba(94, 91, 231, 0.12);
  --nl-violet-line: rgba(94, 91, 231, 0.28);
}
.nl-section { margin-top: 48px; }
.nl-section-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-std); }
.nl-section-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.nl-section-header .nl-section-meta { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 500; font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; }
.nl-section-header .nl-section-meta .nl-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--nl-violet); vertical-align: middle; margin-right: 6px; box-shadow: 0 0 0 3px var(--nl-violet-soft); }

/* Hero stat cards */
.nl-hero-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
@media (max-width: 900px) { .nl-hero-grid { grid-template-columns: repeat(2, 1fr); } }
.nl-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; }
.nl-hero::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--nl-violet); opacity: 0.9; }
.nl-hero-label { font-size: 10.5px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; margin-bottom: 10px; }
.nl-hero-value { font-size: 32px; font-weight: 800; letter-spacing: -1.2px; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
.nl-hero-sub { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-variant-numeric: tabular-nums; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.nl-hero-delta { font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-left: 6px; letter-spacing: 0.02em; }
.nl-hero-delta.up { background: var(--green-bg); color: var(--green); }
.nl-hero-delta.down { background: var(--red-bg); color: var(--red); }
.nl-hero-delta.flat { background: var(--subtle); color: var(--text-secondary); }

/* Block wrapper */
.nl-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; }
.nl-block-title { font-size: 10.5px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; margin-bottom: 14px; display:flex; align-items:baseline; justify-content:space-between; }
.nl-block-note { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; text-transform: none; letter-spacing: 0.04em; font-weight: 500; }

/* Growth chart (SVG) */
.nl-chart { width:100%; height: 200px; display:block; }
.nl-chart .axis { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
.nl-chart .bar { fill: var(--nl-violet); opacity: 0.75; transition: opacity .15s; }
.nl-chart .bar.current { opacity: 1; }
.nl-chart .label { fill: var(--text-muted); font-size: 9px; font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; letter-spacing: 0.12em; text-transform: uppercase; }
.nl-chart .value { fill: var(--text-secondary); font-size: 10px; font-variant-numeric: tabular-nums; font-weight: 500; }

/* Stacked engagement bar */
.nl-stack-wrap { display:flex; flex-direction: column; gap: 12px; }
.nl-stack-bar { height: 12px; background: var(--subtle); border-radius: 6px; overflow: hidden; display:flex; }
.nl-stack-seg { height:100%; transition: opacity .15s; }
.nl-stack-seg.active { background: var(--nl-violet); }
.nl-stack-seg.passive { background: rgba(94, 91, 231, 0.55); }
.nl-stack-seg.disengaged { background: rgba(94, 91, 231, 0.28); }
.nl-stack-seg.dormant { background: rgba(255,255,255,0.12); }
.nl-stack-legend { display:flex; flex-wrap:wrap; gap: 18px; font-size: 12px; color: var(--text-secondary); }
.nl-stack-legend .sw { display:inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
.nl-stack-legend .count { font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; margin-left: 4px; }
.nl-stack-legend .pct { color: var(--text-muted); font-variant-numeric: tabular-nums; margin-left: 4px; font-size: 11px; }

/* Source + latest tables */
.nl-table { width:100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.nl-table th { text-align: left; font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); padding: 0 12px 10px 0; font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; border-bottom: 1px solid var(--border-std); }
.nl-table th.num { text-align: right; }
.nl-table td { padding: 10px 12px 10px 0; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.nl-table td.num { text-align: right; color: var(--text); font-weight: 600; }
.nl-table tr:last-child td { border-bottom: none; }
.nl-table .src-name { color: var(--text); font-weight: 500; }
.nl-table .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-size: 12px; color: var(--text-secondary); letter-spacing: 0.02em; }
.nl-table .ago { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.nl-source-bar { display:inline-block; height: 6px; background: var(--nl-violet); border-radius: 2px; margin-right: 8px; vertical-align: middle; min-width: 2px; }
.nl-latest-vip { color: var(--nl-violet); font-weight: 700; }

.nl-empty { padding: 16px; text-align: center; color: var(--text-tertiary); font-size: 12px; border: 1px dashed var(--border-std); border-radius: 8px; }
.nl-error { padding: 16px; text-align: center; color: var(--red); font-size: 12px; border: 1px dashed rgba(239,68,68,0.3); border-radius: 8px; background: rgba(239,68,68,0.04); }

/* Theme toggle */
.theme-toggle {
  position:fixed; top:16px; right:16px; z-index:100;
  background:var(--frosted); border:1px solid var(--border-std);
  border-radius:40px; padding:8px 12px; cursor:pointer;
  font-size:16px; line-height:1; color:var(--text);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:all 0.2s;
}
.theme-toggle:hover { background:var(--accent-glow); border-color:var(--accent); }
</style>
</head>
<body>
<div id="passcode-overlay">
  <h2>⚡ Command Center</h2>
  <p>Enter passcode to continue</p>
  <form id="passcode-form" style="display:flex; flex-direction:column; gap:14px; align-items:center;">
    <input type="password" id="passcode-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autofocus>
    <button type="submit" id="passcode-submit">Enter</button>
  </form>
  <p id="passcode-error">Invalid passcode</p>
</div>

<button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>

<div class="app" id="app">
  <div class="header">
    <h1>⚡ Command Center</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>
  <div id="flaggedSection"></div>
  <div id="newsletterBar"></div>
  <div class="summary-bar" id="summaryBar"></div>
  <div id="sections"></div>
  <div id="newsletterSection"></div>
</div>

<script>
const PASSCODE_HASH = '490d3f320e422627a4988064d699dd4e4e26436aecbbb15952d964ffc12918b8';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Passcode
const overlay = document.getElementById('passcode-overlay');
const input = document.getElementById('passcode-input');
const error = document.getElementById('passcode-error');

if (sessionStorage.getItem('dash-auth') === 'true') {
  overlay.classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadData();
}

const passcodeForm = document.getElementById('passcode-form');
const submitBtn = document.getElementById('passcode-submit');

async function tryUnlock() {
  if (!input.value || input.value.length < 4) {
    error.textContent = 'Enter a 4-digit passcode';
    error.style.display = 'block';
    input.focus();
    return;
  }
  const hash = await sha256(input.value);
  if (hash === PASSCODE_HASH) {
    sessionStorage.setItem('dash-auth', 'true');
    overlay.classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadData();
  } else {
    error.textContent = 'Invalid passcode';
    error.style.display = 'block';
    input.value = '';
    input.focus();
  }
}

input.addEventListener('input', () => {
  error.style.display = 'none';
  if (input.value.length === 4) tryUnlock();
});

passcodeForm.addEventListener('submit', (e) => {
  e.preventDefault();
  tryUnlock();
});

submitBtn.addEventListener('click', (e) => {
  e.preventDefault();
  tryUnlock();
});

async function loadData() {
  try {
    const res = await fetch('dashboard-data.json?t=' + Date.now());
    const data = await res.json();
    render(data);
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

function daysUntilSunday() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  if (day === 0) return 0;
  return 7 - day;
}

function formatSince(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function render(data) {
  // Subtitle
  const refreshed = new Date(data.lastRefreshed).toLocaleDateString('en-US', {
    month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  document.getElementById('subtitle').textContent = `Last refreshed: ${refreshed}`;

  // ── Flagged Section ──
  if (data.flagged && data.flagged.length > 0) {
    let flagHtml = `
      <div class="flagged-section">
        <div class="flagged-header">
          <h2>🚩 Needs Attention</h2>
          <span class="flagged-count">${data.flagged.length} flagged</span>
        </div>
        <div class="flagged-grid">
    `;
    for (const f of data.flagged) {
      const cls = f.severity === 'blocked' ? 'blocked' : 'attention';
      flagHtml += `
        <div class="flagged-item ${cls}">
          <span class="flag-emoji">${f.emoji}</span>
          <div class="flag-content">
            <div class="flag-title">${f.title}</div>
            <div class="flag-detail">${f.detail}</div>
            <div class="flag-since">Since ${formatSince(f.since)}</div>
          </div>
        </div>
      `;
    }
    flagHtml += '</div></div>';
    document.getElementById('flaggedSection').innerHTML = flagHtml;
  }

  // ── Newsletter Countdown ──
  if (data.newsletter) {
    const nl = data.newsletter;
    const days = daysUntilSunday();
    const isDone = nl.status === 'done';
    const statusLabel = isDone
      ? '<span class="done">✅ Done</span>'
      : '<span class="pending">⏳ In Progress</span>';
    const countdownText = days === 0
      ? '<strong>Sends TODAY</strong>'
      : `<strong>${days} day${days !== 1 ? 's' : ''}</strong> until Sunday send`;

    document.getElementById('newsletterBar').innerHTML = `
      <div class="newsletter-bar">
        <span class="nl-icon">📰</span>
        <div>
          <div class="nl-label">This Week's Newsletter</div>
          <div class="nl-status">${statusLabel} — ${nl.topic || 'Topic TBD'}</div>
          ${nl.note ? `<div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">${nl.note}</div>` : ''}
        </div>
        <div class="nl-countdown">${countdownText}</div>
      </div>
    `;
  }

  // ── Summary Bar ──
  let totalProjects = 0;
  let totalAttn = 0;
  for (const s of data.sections) {
    for (const p of s.projects) {
      totalProjects++;
      if (p.needsAttention) totalAttn++;
    }
  }
  const flaggedCount = data.flagged ? data.flagged.length : 0;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><div class="summary-value">${totalProjects}</div><div class="summary-label">Projects</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:${flaggedCount > 0 ? 'var(--red)' : 'var(--green)'}">${flaggedCount}</div><div class="summary-label">Flagged</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:${totalAttn > 0 ? 'var(--yellow)' : 'var(--green)'}">${totalAttn}</div><div class="summary-label">Needs Attention</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:var(--green)">${totalProjects - totalAttn}</div><div class="summary-label">On Track</div></div>
  `;

  // ── Sections ──
  let sectionsHtml = '';
  for (const section of data.sections) {
    sectionsHtml += `<div class="section">`;
    sectionsHtml += `<div class="section-header">${section.name}</div>`;
    sectionsHtml += `<div class="card-grid">`;

    for (const p of section.projects) {
      const statusClass = p.status === 'blocked' ? 'blocked' : p.status === 'attention' ? 'attention' : '';
      const dotClass = p.status;
      const lastUp = new Date(p.lastUpdated + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });

      let attnHtml = '';
      if (p.needsAttention) {
        attnHtml = `<div class="card-attention">⚠️ ${p.needsAttention}</div>`;
      }

      let bulletsHtml = '<ul class="card-bullets">';
      for (const b of p.bullets) {
        bulletsHtml += `<li>${b}</li>`;
      }
      bulletsHtml += '</ul>';

      sectionsHtml += `
        <div class="card ${statusClass}">
          <div class="card-header">
            <div class="card-title">
              <span class="emoji">${p.emoji}</span>
              <h3>${p.title}</h3>
            </div>
            <div class="status-dot ${dotClass}" title="${p.status}"></div>
          </div>
          <div class="card-meta">Updated ${lastUp}</div>
          ${bulletsHtml}
          ${attnHtml}
        </div>
      `;
    }

    sectionsHtml += '</div></div>';
  }

  document.getElementById('sections').innerHTML = sectionsHtml;

  // ── Open Commitments Section ── (disabled 2026-04-21 - Rameez handles filtering)
  if (false) try {
    const cRes = await fetch('https://fireflies.nik.co/api/commitments?t=' + Date.now());
    if (cRes.ok) {
      const cData = await cRes.json();
      const open = cData.commitments || [];
      const overdueCount = open.filter(c => c.status === 'overdue').length;
      const agingCount = open.filter(c => c.status === 'aging').length;
      let cHtml = `
        <div class="commitments-section">
          <div class="commitments-section-header">
            <h2>📝 Open Commitments</h2>
            <div class="cmt-stats">
              <div><strong>${open.length}</strong> open</div>
              ${agingCount ? `<div class="cmt-stat-aging"><strong>${agingCount}</strong> aging</div>` : ''}
              ${overdueCount ? `<div class="cmt-stat-overdue"><strong>${overdueCount}</strong> overdue</div>` : ''}
            </div>
          </div>
      `;
      if (open.length === 0) {
        cHtml += '<div class="cmt-empty">✨ Inbox zero on commitments. All follow-ups closed.</div>';
      } else {
        cHtml += '<div class="commitments-list">';
        for (const c of open.slice(0, 20)) {
          const status = c.status || 'open';
          const cardCls = status === 'overdue' ? 'overdue' : status === 'aging' ? 'aging' : '';
          const source = c.source || 'meeting';
          const sourceIcon = source === 'email' ? '📧' : '🎙️';
          const owed = c.owed_to && c.owed_to.length ? ` → ${c.owed_to.join(', ')}` : '';
          const mtg = c.meeting_title || 'meeting';
          const ageMs = Date.now() - new Date(c.created_at).getTime();
          const ageH = Math.floor(ageMs / 3600000);
          const ageLabel = ageH < 1 ? 'just now' : ageH < 24 ? `${ageH}h ago` : `${Math.floor(ageH/24)}d ago`;
          const linkLabel = source === 'email' ? 'open email' : 'transcript';
          const urgencyBadge = c.urgency === 'high' ? '<span class="cmt-badge overdue" style="margin-left:4px;">high</span>' : '';
          cHtml += `
            <div class="commitment-card ${cardCls}">
              <span class="cmt-badge ${status}">${sourceIcon} ${status}</span>
              <div class="cmt-body">
                <div class="cmt-sentence">“${c.sentence || ''}”${owed}${urgencyBadge}</div>
                <div class="cmt-meta">
                  <span>${mtg}</span>
                  <span class="dot">·</span>
                  <span>${ageLabel}</span>
                  ${c.transcript_url ? `<span class="dot">·</span><a href="${c.transcript_url}" target="_blank">${linkLabel}</a>` : ''}
                </div>
              </div>
            </div>
          `;
        }
        cHtml += '</div>';
      }
      cHtml += '</div>';
      document.getElementById('sections').insertAdjacentHTML('beforeend', cHtml);
    }
  } catch (e) { console.warn('commitments fetch failed', e); }

  // ── Sites Section ──
  if (data.sites && data.sites.groups && data.sites.groups.length > 0) {
    const s = data.sites;
    const domains = Object.entries(s.domains || {}).map(([d, reg]) => `${d} (${reg})`).join(' · ');
    let sitesHtml = `
      <div class="sites-section">
        <div class="sites-section-header">
          <h2>🌐 Sites &amp; Subdomains</h2>
          <div class="sites-meta">${s.totalCount} live · ${domains}</div>
        </div>
    `;
    for (const g of s.groups) {
      sitesHtml += `
        <div class="sites-group">
          <div class="sites-group-label">${g.label}<span class="sites-group-count">${g.count}</span></div>
          <div class="sites-grid">
      `;
      for (const site of g.sites) {
        const statusClass = site.status || 'live';
        const cardClass = ['building','staging','draft'].includes(statusClass) ? statusClass : '';
        const deployed = site.deployed ? formatSince(site.deployed) : '';
        sitesHtml += `
          <div class="site-card ${cardClass}">
            <div class="site-sub">
              <a class="site-link" href="https://${site.subdomain}" target="_blank" rel="noopener">${site.subdomain}</a>
              <span class="site-status ${statusClass}">${statusClass}</span>
            </div>
            <div class="site-purpose">${site.purpose || ''}</div>
            <div class="site-meta">
              ${site.stack ? `<span>${site.stack}</span>` : ''}
              ${deployed ? `<span class="dot">·</span><span>Shipped ${deployed}</span>` : ''}
              ${site.owner ? `<span class="dot">·</span><span>${site.owner}</span>` : ''}
            </div>
          </div>
        `;
      }
      sitesHtml += '</div></div>';
    }
    sitesHtml += '</div>';
    document.getElementById('sections').insertAdjacentHTML('beforeend', sitesHtml);
  }

  // ── Newsletter Section (Sharma list via api.newsletter.nik.co) ──
  renderNewsletter().catch(e => console.warn('newsletter render failed', e));
}

const NL_API_BASE = 'https://api.newsletter.nik.co';

function nlFmt(n) {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US');
}
function nlPct(whole, part) {
  if (!whole) return 0;
  return Math.round((part / whole) * 1000) / 10;
}
function nlAgo(ts) {
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  if (Number.isNaN(d)) return '';
  const mins = Math.floor(d / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 14) return `${days}d ago`;
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function nlRenderChart(monthsAll) {
  // Take last 24 months for density. Fall back gracefully.
  const months = (monthsAll || []).slice(-24);
  if (!months.length) return '<div class="nl-empty">No growth history available.</div>';

  const W = 760, H = 180, padL = 36, padR = 12, padT = 16, padB = 28;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const maxVal = Math.max(...months.map(m => m.signups), 1);
  const barSpace = innerW / months.length;
  const barW = Math.max(barSpace * 0.62, 3);

  const bars = months.map((m, i) => {
    const h = Math.max((m.signups / maxVal) * innerH, 1);
    const x = padL + i * barSpace + (barSpace - barW) / 2;
    const y = padT + innerH - h;
    const isCurrent = i === months.length - 1;
    return `<rect class="bar ${isCurrent ? 'current' : ''}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="1.5"><title>${m.month}: ${m.signups.toLocaleString()} signups</title></rect>`;
  }).join('');

  // Axis ticks — first, mid, last
  const pickTicks = [0, Math.floor(months.length / 2), months.length - 1];
  const xLabels = pickTicks.map(i => {
    const x = padL + i * barSpace + barSpace / 2;
    return `<text class="label" x="${x.toFixed(1)}" y="${(H - 10).toFixed(1)}" text-anchor="middle">${months[i].month}</text>`;
  }).join('');

  const yTop = `<text class="value" x="${padL - 6}" y="${(padT + 10).toFixed(1)}" text-anchor="end">${maxVal.toLocaleString()}</text>`;
  const yBot = `<text class="value" x="${padL - 6}" y="${(padT + innerH).toFixed(1)}" text-anchor="end">0</text>`;
  const axis = `<line class="axis" x1="${padL}" y1="${padT + innerH}" x2="${W - padR}" y2="${padT + innerH}" />`;

  return `<svg class="nl-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Monthly signups">${axis}${bars}${yTop}${yBot}${xLabels}</svg>`;
}

async function renderNewsletter() {
  const root = document.getElementById('newsletterSection');
  if (!root) return;
  const bust = Date.now();
  let stats = null, caps = null, srcs = null;
  try {
    const [sR, cR, srR] = await Promise.allSettled([
      fetch(`${NL_API_BASE}/api/newsletter/stats?t=${bust}`).then(r => r.json()),
      fetch(`${NL_API_BASE}/api/newsletter/captures?days=30&t=${bust}`).then(r => r.json()),
      fetch(`${NL_API_BASE}/api/newsletter/sources?t=${bust}`).then(r => r.json()),
    ]);
    if (sR.status === 'fulfilled' && sR.value.ok) stats = sR.value;
    if (cR.status === 'fulfilled' && cR.value.ok) caps = cR.value;
    if (srR.status === 'fulfilled' && srR.value.ok) srcs = srR.value;
  } catch (e) {
    root.innerHTML = `<div class="nl-section"><div class="nl-section-header"><h2>📬 Newsletter</h2></div><div class="nl-error">Couldn’t reach api.newsletter.nik.co — ${String(e).slice(0, 120)}</div></div>`;
    return;
  }
  if (!stats) {
    root.innerHTML = `<div class="nl-section"><div class="nl-section-header"><h2>📬 Newsletter</h2></div><div class="nl-error">Stats unavailable from api.newsletter.nik.co</div></div>`;
    return;
  }

  // Hero deltas
  const delta = stats.delta_new;
  const deltaPct = stats.delta_pct;
  const deltaCls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
  const deltaSign = delta > 0 ? '+' : '';
  const deltaLabel = deltaPct === null || deltaPct === undefined
    ? `${deltaSign}${nlFmt(delta)}`
    : `${deltaSign}${nlFmt(delta)} · ${deltaSign}${deltaPct}%`;

  const emailablePct = stats.total > 0 ? Math.round((stats.emailable / stats.total) * 100) : 0;
  const activePct = stats.emailable > 0 ? Math.round((stats.active / stats.emailable) * 100) : 0;

  // Stacked engagement calc — based on emailable cohort
  const baseCohort = Math.max(stats.active + stats.passive + stats.disengaged + (stats.dormant || 0), 1);
  const seg = k => Math.max((stats[k] || 0) / baseCohort * 100, 0);

  // Sources — prefer our capture log if it has data, otherwise Sailthru lifetime sources.
  let sourceRows = [];
  if (srcs && srcs.sources && srcs.sources.length) {
    const maxC = srcs.sources[0].count;
    sourceRows = srcs.sources.slice(0, 10).map(s => ({
      name: s.source,
      count: s.count,
      widthPct: Math.max((s.count / maxC) * 100, 4),
      last: s.last_capture,
    }));
  } else if (stats.sources_top && stats.sources_top.length) {
    const maxC = stats.sources_top[0].count;
    sourceRows = stats.sources_top.slice(0, 10).map(s => ({
      name: s.source,
      count: s.count,
      widthPct: Math.max((s.count / maxC) * 100, 4),
      last: null,
    }));
  }

  const VIP_DOMAINS = ['nik.co','sequoiacap.com','a16z.com','ycombinator.com','y-combinator.com','techcrunch.com','stripe.com','firstround.com'];
  const isVip = email => VIP_DOMAINS.some(d => email && (email.endsWith('@'+d) || email.endsWith('.'+d)));

  // Build HTML
  const lastSend = stats.meta && stats.meta.last_send ? new Date(stats.meta.last_send).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';
  const currentMonth = stats.current_month || '';

  let html = `
    <div class="nl-section">
      <div class="nl-section-header">
        <h2>📬 Newsletter</h2>
        <div class="nl-section-meta"><span class="nl-dot"></span>Sharma list · last send ${lastSend}</div>
      </div>

      <div class="nl-hero-grid">
        <div class="nl-hero">
          <div class="nl-hero-label">Total subs</div>
          <div class="nl-hero-value">${nlFmt(stats.total)}</div>
          <div class="nl-hero-sub">All-time</div>
        </div>
        <div class="nl-hero">
          <div class="nl-hero-label">Emailable</div>
          <div class="nl-hero-value">${nlFmt(stats.emailable)}</div>
          <div class="nl-hero-sub">${emailablePct}% of total</div>
        </div>
        <div class="nl-hero">
          <div class="nl-hero-label">Active</div>
          <div class="nl-hero-value">${nlFmt(stats.active)}</div>
          <div class="nl-hero-sub">${activePct}% of emailable</div>
        </div>
        <div class="nl-hero">
          <div class="nl-hero-label">New · ${currentMonth}</div>
          <div class="nl-hero-value">${nlFmt(stats.new_this_period)}</div>
          <div class="nl-hero-sub">vs prior <span class="nl-hero-delta ${deltaCls}">${deltaLabel}</span></div>
        </div>
      </div>

      <div class="nl-block">
        <div class="nl-block-title">Monthly signups <span class="nl-block-note">Last 24 months</span></div>
        ${nlRenderChart(stats.signup_month)}
      </div>

      <div class="nl-block">
        <div class="nl-block-title">Engagement mix <span class="nl-block-note">${nlFmt(baseCohort)} classified</span></div>
        <div class="nl-stack-wrap">
          <div class="nl-stack-bar">
            <div class="nl-stack-seg active" style="width:${seg('active').toFixed(2)}%"></div>
            <div class="nl-stack-seg passive" style="width:${seg('passive').toFixed(2)}%"></div>
            <div class="nl-stack-seg disengaged" style="width:${seg('disengaged').toFixed(2)}%"></div>
            <div class="nl-stack-seg dormant" style="width:${seg('dormant').toFixed(2)}%"></div>
          </div>
          <div class="nl-stack-legend">
            <span><span class="sw" style="background:var(--nl-violet)"></span>Active<span class="count">${nlFmt(stats.active)}</span><span class="pct">${nlPct(baseCohort, stats.active)}%</span></span>
            <span><span class="sw" style="background:rgba(94,91,231,0.55)"></span>Passive<span class="count">${nlFmt(stats.passive)}</span><span class="pct">${nlPct(baseCohort, stats.passive)}%</span></span>
            <span><span class="sw" style="background:rgba(94,91,231,0.28)"></span>Disengaged<span class="count">${nlFmt(stats.disengaged)}</span><span class="pct">${nlPct(baseCohort, stats.disengaged)}%</span></span>
            ${stats.dormant ? `<span><span class="sw" style="background:rgba(255,255,255,0.12)"></span>Dormant<span class="count">${nlFmt(stats.dormant)}</span><span class="pct">${nlPct(baseCohort, stats.dormant)}%</span></span>` : ''}
          </div>
        </div>
      </div>
  `;

  // Sources block
  if (sourceRows.length) {
    html += `
      <div class="nl-block">
        <div class="nl-block-title">Top sources <span class="nl-block-note">${srcs && srcs.sources && srcs.sources.length ? 'Last 30 days' : 'Lifetime (Sailthru)'}</span></div>
        <table class="nl-table">
          <thead><tr><th>Source</th><th></th><th class="num">Signups</th><th class="num">Last</th></tr></thead>
          <tbody>
            ${sourceRows.map(r => `
              <tr>
                <td><span class="src-name">${r.name}</span></td>
                <td style="width:35%"><span class="nl-source-bar" style="width:${r.widthPct.toFixed(1)}%"></span></td>
                <td class="num">${nlFmt(r.count)}</td>
                <td class="num"><span class="ago">${r.last ? nlAgo(r.last) : '—'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;
  } else {
    html += `<div class="nl-block"><div class="nl-block-title">Top sources</div><div class="nl-empty">No source data yet — captures will populate here once live.</div></div>`;
  }

  // Latest captures
  const latest = (caps && caps.latest) || [];
  if (latest.length) {
    html += `
      <div class="nl-block">
        <div class="nl-block-title">Latest captures <span class="nl-block-note">Last 10</span></div>
        <table class="nl-table">
          <thead><tr><th>Email</th><th>Source</th><th class="num">When</th></tr></thead>
          <tbody>
            ${latest.map(c => `
              <tr>
                <td class="mono ${isVip(c.email) ? 'nl-latest-vip' : ''}">${c.email}${isVip(c.email) ? ' ★' : ''}</td>
                <td>${c.source}</td>
                <td class="num"><span class="ago">${nlAgo(c.ts)}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;
  } else {
    html += `<div class="nl-block"><div class="nl-block-title">Latest captures</div><div class="nl-empty">No captures in the last 30 days.</div></div>`;
  }

  html += `</div>`;
  root.innerHTML = html;

  // Stash hero stats into dashboard-data for downstream consumers.
  window.__nlHero = {
    total: stats.total,
    emailable: stats.emailable,
    active: stats.active,
    new_this_period: stats.new_this_period,
    current_month: stats.current_month,
    ts: stats.ts,
  };
}
</script>
