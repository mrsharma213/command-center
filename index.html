<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Command Center</title>
<meta name="description" content="Nik Sharma's operational command center">
<meta property="og:title" content="⚡ Command Center">
<meta property="og:description" content="Operational command center — all projects at a glance">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dash.nik.co">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="⚡ Command Center">
<meta name="twitter:description" content="Operational command center — all projects at a glance">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Command Center">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180' rx='40'/><text x='90' y='125' text-anchor='middle' font-size='100'>⚡</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --text: #ffffff;
  --text-secondary: #a6a6a6;
  --text-tertiary: rgba(255,255,255,0.6);
  --text-muted: rgba(255,255,255,0.4);
  --accent: #fbbf24;
  --accent-hover: #fcd34d;
  --accent-glow: rgba(251,191,36,0.15);
  --accent-muted: rgba(251,191,36,0.1);
  --border: rgba(255,255,255,0.05);
  --border-std: rgba(255,255,255,0.08);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.15);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.15);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.15);
  --frosted: rgba(255,255,255,0.1);
  --subtle: rgba(255,255,255,0.05);
  font-family: 'Inter var', 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  font-feature-settings: "cv01", "cv05", "cv09", "cv11", "ss03", "ss07";
}
@media (prefers-color-scheme: light) {
  :root:not(.dark) {
    --bg: #ffffff; --surface: #f5f5f5; --text: #000000; --text-secondary: #555555;
    --text-tertiary: rgba(0,0,0,0.5); --text-muted: rgba(0,0,0,0.35);
    --accent: #d97706; --accent-hover: #b45309; --accent-glow: rgba(217,119,6,0.12);
    --accent-muted: rgba(217,119,6,0.08); --border: rgba(0,0,0,0.06);
    --border-std: rgba(0,0,0,0.1); --frosted: rgba(0,0,0,0.06); --subtle: rgba(0,0,0,0.03);
    --green-bg: rgba(34,197,94,0.1); --yellow-bg: rgba(217,119,6,0.1); --red-bg: rgba(239,68,68,0.1);
  }
}
.dark {
  --bg: #000000; --surface: #0a0a0a; --text: #ffffff; --text-secondary: #a6a6a6;
  --text-tertiary: rgba(255,255,255,0.6); --text-muted: rgba(255,255,255,0.4);
  --accent: #fbbf24; --accent-hover: #fcd34d; --accent-glow: rgba(251,191,36,0.15);
  --accent-muted: rgba(251,191,36,0.1); --border: rgba(255,255,255,0.05);
  --border-std: rgba(255,255,255,0.08); --frosted: rgba(255,255,255,0.1); --subtle: rgba(255,255,255,0.05);
  --green-bg: rgba(34,197,94,0.15); --yellow-bg: rgba(251,191,36,0.15); --red-bg: rgba(239,68,68,0.15);
}
.light {
  --bg: #ffffff; --surface: #f5f5f5; --text: #000000; --text-secondary: #555555;
  --text-tertiary: rgba(0,0,0,0.5); --text-muted: rgba(0,0,0,0.35);
  --accent: #d97706; --accent-hover: #b45309; --accent-glow: rgba(217,119,6,0.12);
  --accent-muted: rgba(217,119,6,0.08); --border: rgba(0,0,0,0.06);
  --border-std: rgba(0,0,0,0.1); --frosted: rgba(0,0,0,0.06); --subtle: rgba(0,0,0,0.03);
  --green-bg: rgba(34,197,94,0.1); --yellow-bg: rgba(217,119,6,0.1); --red-bg: rgba(239,68,68,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); min-height:100vh; transition: background 0.2s, color 0.2s; }

/* Passcode */
#passcode-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:24px;
}
#passcode-overlay.hidden { display:none; }
#passcode-overlay h2 { font-size:24px; font-weight:600; letter-spacing:-1px; color:var(--text); }
#passcode-overlay p { font-size:13px; color:var(--text-secondary); }
#passcode-input {
  background:var(--surface); border:1px solid var(--border-std); border-radius:12px;
  padding:12px 20px; font-size:24px; letter-spacing:12px; text-align:center;
  color:var(--text); width:200px; outline:none; font-family:inherit;
}
#passcode-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
#passcode-error { color:var(--red); font-size:13px; display:none; }

/* App */
.app { display:none; max-width:1200px; margin:0 auto; padding:32px 24px; }
.app.visible { display:block; }

/* Header */
.header { margin-bottom:32px; }
.header h1 { font-size:40px; font-weight:700; letter-spacing:-2px; }
.header .subtitle { font-size:14px; color:var(--text-secondary); margin-top:4px; }

/* Summary bar */
.summary-bar {
  display:flex; gap:20px; margin-bottom:32px; padding:20px 24px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  flex-wrap:wrap;
}
.summary-stat { }
.summary-value { font-size:28px; font-weight:700; letter-spacing:-1px; color:var(--text); }
.summary-label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-top:2px; }
.summary-divider { width:1px; background:var(--border-std); margin:0 4px; }

/* Grid */
.card-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:16px;
}
@media (max-width:1024px) { .card-grid { grid-template-columns:repeat(2, 1fr); } }
@media (max-width:640px) { .card-grid { grid-template-columns:1fr; } }

/* Cards */
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:20px; transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color:var(--border-std); }
.card.attention { border-color:rgba(251,191,36,0.3); box-shadow:var(--accent-glow) 0px 0px 0px 1px; }
.card.blocked { border-color:rgba(239,68,68,0.3); box-shadow:rgba(239,68,68,0.15) 0px 0px 0px 1px; }

.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.card-title { display:flex; align-items:center; gap:8px; }
.card-title .emoji { font-size:20px; }
.card-title h3 { font-size:16px; font-weight:600; letter-spacing:-0.5px; }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-dot.on-track { background:var(--green); }
.status-dot.attention { background:var(--yellow); }
.status-dot.blocked { background:var(--red); }

.card-meta { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:500; margin-bottom:12px; }

.card-bullets { list-style:none; padding:0; }
.card-bullets li {
  font-size:13px; line-height:1.55; color:var(--text-secondary);
  padding:3px 0 3px 14px; position:relative;
}
.card-bullets li::before {
  content:''; position:absolute; left:0; top:10px;
  width:4px; height:4px; border-radius:50%; background:var(--text-muted);
}

.card-attention {
  margin-top:12px; padding:10px 12px; border-radius:8px;
  background:var(--yellow-bg); font-size:12px; font-weight:500;
  color:var(--yellow); line-height:1.5;
}

/* Theme toggle */
.theme-toggle {
  position:fixed; top:16px; right:16px; z-index:100;
  background:var(--frosted); border:1px solid var(--border-std);
  border-radius:40px; padding:8px 12px; cursor:pointer;
  font-size:16px; line-height:1; color:var(--text);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:all 0.2s;
}
.theme-toggle:hover { background:var(--accent-glow); border-color:var(--accent); }
</style>
</head>
<body>
<div id="passcode-overlay">
  <h2>⚡ Command Center</h2>
  <p>Enter passcode to continue</p>
  <input type="password" id="passcode-input" maxlength="4" inputmode="numeric" autocomplete="off" autofocus>
  <p id="passcode-error">Invalid passcode</p>
</div>

<button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

<div class="app" id="app">
  <div class="header">
    <h1>⚡ Command Center</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>
  <div class="summary-bar" id="summaryBar"></div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<script>
const PASSCODE_HASH = '490d3f320e422627a4988064d699dd4e4e26436aecbbb15952d964ffc12918b8';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Theme
function getTheme() {
  const saved = localStorage.getItem('dash-theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
function applyTheme(theme) {
  document.documentElement.className = theme;
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('dash-theme', theme);
}
applyTheme(getTheme());
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
});

// Passcode
const overlay = document.getElementById('passcode-overlay');
const input = document.getElementById('passcode-input');
const error = document.getElementById('passcode-error');

if (sessionStorage.getItem('dash-auth') === 'true') {
  overlay.classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadData();
}

input.addEventListener('input', async () => {
  error.style.display = 'none';
  if (input.value.length === 4) {
    const hash = await sha256(input.value);
    if (hash === PASSCODE_HASH) {
      sessionStorage.setItem('dash-auth', 'true');
      overlay.classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      loadData();
    } else {
      error.style.display = 'block';
      input.value = '';
      input.focus();
    }
  }
});

async function loadData() {
  try {
    const res = await fetch('dashboard-data.json');
    const data = await res.json();
    render(data);
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

function render(data) {
  const projects = data.projects;
  const total = projects.length;
  const needsAttn = projects.filter(p => p.needsAttention).length;
  const refreshed = new Date(data.lastRefreshed).toLocaleDateString('en-US', {
    month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'
  });

  document.getElementById('subtitle').textContent = `Last refreshed: ${refreshed}`;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><div class="summary-value">${total}</div><div class="summary-label">Projects</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:${needsAttn > 0 ? 'var(--yellow)' : 'var(--green)'}">${needsAttn}</div><div class="summary-label">Needs Attention</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-value" style="color:var(--green)">${total - needsAttn}</div><div class="summary-label">On Track</div></div>
  `;

  let html = '';
  for (const p of projects) {
    const statusClass = p.status === 'blocked' ? 'blocked' : p.status === 'attention' ? 'attention' : '';
    const dotClass = p.status;
    const lastUp = new Date(p.lastUpdated + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });

    let attnHtml = '';
    if (p.needsAttention) {
      attnHtml = `<div class="card-attention">⚠️ ${p.needsAttention}</div>`;
    }

    let bulletsHtml = '<ul class="card-bullets">';
    for (const b of p.bullets) {
      bulletsHtml += `<li>${b}</li>`;
    }
    bulletsHtml += '</ul>';

    html += `
      <div class="card ${statusClass}">
        <div class="card-header">
          <div class="card-title">
            <span class="emoji">${p.emoji}</span>
            <h3>${p.title}</h3>
          </div>
          <div class="status-dot ${dotClass}" title="${p.status}"></div>
        </div>
        <div class="card-meta">Updated ${lastUp}</div>
        ${bulletsHtml}
        ${attnHtml}
      </div>
    `;
  }

  document.getElementById('cardGrid').innerHTML = html;
}
</script>
</body>
</html>
